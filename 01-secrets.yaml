# Secret de MariaDB en namespace 'databases'
apiVersion: v1
kind: Secret
metadata:
  name: mariadb-secret
  namespace: databases
type: Opaque
data:
  mariadb-root-password: Um9vdERCIzIwMjQh   # RootDB#2024!
  mariadb-user-password: V3BVc2VyIzIwMjQh   # WpUser#2024!

---
# Secret de MariaDB en namespace 'wordpress'
apiVersion: v1
kind: Secret
metadata:
  name: mariadb-secret
  namespace: wordpress
type: Opaque
data:
  mariadb-user-password: V3BVc2VyIzIwMjQh   # WpUser#2024!

---
# Secret de Redis en namespace 'databases'
apiVersion: v1
kind: Secret
metadata:
  name: redis-secret
  namespace: databases
type: Opaque
data:
  redis-password: UmVkaXMjMjAyNCE=   # Redis#2024!

---
# Secret de Redis en namespace 'wordpress'
apiVersion: v1
kind: Secret
metadata:
  name: redis-secret
  namespace: wordpress
type: Opaque
data:
  redis-password: UmVkaXMjMjAyNCE=   # Redis#2024!
