# ============================================================
# Secret para MariaDB en el namespace 'databases'
# Usado por los Pods de MariaDB y Redis
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: mariadb-secret
  namespace: databases        # Namespace principal donde vive MariaDB
type: Opaque
data:
  # ATENCIÓN: Los valores son el resultado de: echo -n "alumne123" | base64
  # CAMBIAR en producción por contraseñas seguras
  mariadb-root-password: YWx1bW5lMTIz  # Contraseña del superusuario 'root'
  mariadb-user-password: YWx1bW5lMTIz  # Contraseña del usuario 'wordpress_user'

---
# ============================================================
# Copia del Secret en el namespace 'wordpress'
# Necesaria porque los Secrets son namespace-scoped y WordPress
# necesita la contraseña de BD desde su propio namespace.
# IMPORTANTE: Mantener ambos sincronizados si cambias las contraseñas.
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: mariadb-secret
  namespace: wordpress        # Copia en el namespace de WordPress
type: Opaque
data:
  mariadb-root-password: YWx1bW5lMTIz
  mariadb-user-password: YWx1bW5lMTIz
