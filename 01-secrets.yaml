# ============================================================
# 01-secrets.yaml — REEMPLAZADO POR SEALED SECRETS
# ============================================================
# Los Secrets de MariaDB y Redis ya NO se gestionan aquí.
# Ahora se usan SealedSecrets, que son seguros para commitear
# al repositorio porque están cifrados con la clave pública
# del clúster. Solo el controller dentro del clúster puede
# descifrarlos y crear los Secrets reales en cada namespace.
#
# FICHEROS QUE LO REEMPLAZAN (generados automáticamente por deploy.sh):
#   sealed-mariadb-secret-databases.yaml  → Secret mariadb-secret en namespace 'databases'
#   sealed-mariadb-secret-wordpress.yaml  → Secret mariadb-secret en namespace 'wordpress'
#   sealed-redis-secret-databases.yaml    → Secret redis-secret   en namespace 'databases'
#   sealed-redis-secret-wordpress.yaml    → Secret redis-secret   en namespace 'wordpress'
#
# FLUJO AUTOMÁTICO (no requiere intervención manual):
#   1. deploy.sh instala el Sealed Secrets Controller en kube-system
#   2. deploy.sh instala kubeseal CLI en el host
#   3. deploy.sh genera los sealed-*.yaml si no existen aún
#   4. deploy.sh aplica los sealed-*.yaml con kubectl apply
#   5. El controller descifra cada SealedSecret y crea el Secret real
#
# AVISO — RECONSTRUCCIÓN DEL CLÚSTER:
#   Si ejecutas 'minikube delete', el clúster pierde su clave privada.
#   Los sealed-*.yaml existentes dejan de ser válidos porque fueron
#   cifrados con la clave del clúster anterior.
#   Solución: borra los sealed-*.yaml y vuelve a ejecutar deploy.sh
#   (o restaura la clave desde el backup antes de recrear el clúster).
#
# BACKUP DE LA CLAVE PRIVADA DEL CLÚSTER (hacer después del primer deploy):
#   kubectl get secret -n kube-system \
#     -l sealedsecrets.bitnami.com/sealed-secrets-key \
#     -o yaml > sealed-secrets-master-key-backup.yaml
#   ⚠️  Guardar en lugar seguro. NUNCA subir al repositorio.
#
# ROTACIÓN DE CONTRASEÑAS:
#   1. Borrar los sealed-*.yaml existentes
#   2. Editar las contraseñas en la función generate_sealed_secrets() de deploy.sh
#   3. Ejecutar deploy.sh → genera nuevos SealedSecrets automáticamente
# ============================================================
