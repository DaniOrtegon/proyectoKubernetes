<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>KubeNet — WordPress HA</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#060B12;font-family:'Inter',-apple-system,sans-serif;color:#E2E8F0;min-height:100vh}
button{font-family:inherit;cursor:pointer}
#header{border-bottom:1px solid #1E293B;padding:16px 28px;display:flex;align-items:center;gap:16px;background:#0D1117;position:sticky;top:0;z-index:50;flex-wrap:wrap}
.logo{width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,#3B82F6,#8B5CF6);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.logo-title{font-size:16px;font-weight:700;color:#F8FAFC}
.logo-sub{font-size:11px;color:#475569;font-family:monospace}
.tabs{margin-left:auto;display:flex;gap:4px;flex-wrap:wrap}
.tab-btn{background:transparent;border:1px solid transparent;color:#64748B;border-radius:8px;padding:8px 16px;font-size:13px;display:flex;align-items:center;gap:6px;transition:all .15s}
.tab-btn.active{background:#1E293B;border-color:#3B82F6;color:#7DD3FC;font-weight:600}
#stats{display:flex;border-bottom:1px solid #1E293B;background:#0D1117}
.stat{flex:1;padding:10px 20px;border-right:1px solid #1E293B;text-align:center}
.stat-val{font-size:20px;font-weight:800;font-family:monospace}
.stat-label{color:#475569;font-size:10px;margin-top:2px}
#main{padding:24px 28px;transition:padding-right .3s}
#main.panel-open{padding-right:408px}
.tab-content{display:none}
.tab-content.active{display:block}
/* DIAGRAM */
.diag-toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.diag-hint{color:#64748B;font-size:12px}
.diag-filters{display:flex;gap:6px;flex-wrap:wrap}
.flt-btn{background:transparent;border:1px solid #2A3441;color:#64748B;border-radius:6px;padding:5px 12px;font-size:11px;font-family:monospace;transition:all .2s}
.flt-btn.active{background:#1E293B;color:#E2E8F0;border-color:#475569}
.diagram-wrap{overflow-x:auto}
svg{display:block;margin:0 auto}
.legend{display:flex;gap:20px;justify-content:center;margin-top:14px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:6px}
.legend-dot{width:10px;height:10px;border-radius:2px}
.legend-text{color:#64748B;font-size:11px;font-family:monospace}
#conn-tip{position:fixed;background:#0D1117;border:1px solid #334155;border-radius:8px;padding:10px 14px;font-size:11px;color:#94A3B8;pointer-events:none;z-index:300;max-width:240px;font-family:monospace;box-shadow:0 8px 32px #00000080;display:none}
/* FILES */
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.filter-btn{background:transparent;border:1px solid #2A3441;color:#64748B;border-radius:6px;padding:4px 12px;font-size:12px;transition:all .15s}
.filter-btn.active{background:#1E293B;border-color:#3B82F6;color:#7DD3FC}
.files-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:12px}
.file-card{background:#0D1117;border:1px solid #1E293B;border-radius:10px;padding:16px;cursor:pointer;text-align:left;transition:all .15s;width:100%}
.file-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.file-card-left{display:flex;align-items:center;gap:8px}
.file-name{color:#E2E8F0;font-size:13px;font-weight:600;font-family:monospace}
.file-badge{border-radius:4px;padding:2px 8px;font-size:10px;white-space:nowrap;border:1px solid}
.file-desc{color:#64748B;font-size:12px;line-height:1.6}
/* NAMESPACES */
.ns-list{display:flex;flex-direction:column;gap:16px}
.ns-block{border-radius:12px;overflow:hidden;border:1px solid}
.ns-header{width:100%;background:none;border:none;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.ns-header-left{display:flex;align-items:center;gap:12px}
.ns-dot{width:8px;height:8px;border-radius:50%}
.ns-title{font-size:15px;font-weight:700;font-family:monospace}
.ns-desc{color:#475569;font-size:12px}
.ns-right{display:flex;align-items:center;gap:8px}
.ns-count{border-radius:4px;padding:2px 8px;font-size:11px;border:1px solid}
.ns-body{padding:16px 20px;display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.pod-card{background:#0D1117;border-radius:8px;padding:12px 14px;cursor:pointer;text-align:left;transition:all .15s;border:1px solid;width:100%}
.pod-icon{font-size:22px;margin-bottom:6px}
.pod-name{font-size:12px;font-weight:600;font-family:monospace;margin-bottom:4px}
.pod-badges{display:flex;gap:4px;flex-wrap:wrap}
.pod-badge{border-radius:3px;padding:1px 6px;font-size:10px}
.pod-ports{margin-top:6px;color:#475569;font-size:10px;font-family:monospace}
/* DETAIL PANEL */
#detail-panel{position:fixed;right:0;top:0;bottom:0;width:380px;background:#0D1117;z-index:100;overflow-y:auto;padding:24px;display:none;border-left:1px solid #1E293B}
#detail-panel.open{display:block}
.dp-close{background:none;border:1px solid #2A3441;color:#64748B;padding:4px 10px;border-radius:6px;margin-bottom:20px;font-size:12px}
.dp-icon{font-size:32px;margin-bottom:12px}
.dp-kind{font-size:11px;font-family:monospace;margin-bottom:6px;text-transform:uppercase;letter-spacing:2px}
.dp-name{color:#E2E8F0;font-size:20px;font-weight:700;margin-bottom:16px;line-height:1.3}
.dp-image-box{background:#161B22;border:1px solid #2A3441;border-radius:6px;padding:8px 12px;margin-bottom:16px}
.dp-image-label{color:#64748B;font-size:10px;margin-bottom:4px;text-transform:uppercase;letter-spacing:1px}
.dp-image-val{color:#7DD3FC;font-size:12px;font-family:monospace}
.dp-desc{color:#94A3B8;font-size:13px;line-height:1.7;margin-bottom:20px}
.dp-sec-label{color:#64748B;font-size:10px;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.dp-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.dp-connect-item{background:#161B22;border:1px solid #2A3441;color:#94A3B8;border-radius:4px;padding:5px 10px;font-size:11px;font-family:monospace;display:flex;flex-direction:column;gap:2px}
.dp-connect-proto{color:#475569;font-size:10px}
.dp-concept{background:#1E293B;border:1px solid #334155;color:#94A3B8;border-radius:4px;padding:2px 8px;font-size:11px}
/* FLOW */
.flow-wrap{max-width:860px;margin:0 auto}
.flow-step{display:flex;align-items:flex-start;gap:20px;margin-bottom:6px}
.flow-left{display:flex;flex-direction:column;align-items:center;flex-shrink:0}
.flow-num{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;font-family:monospace;border:2px solid;flex-shrink:0}
.flow-vline{width:2px;flex:1;min-height:20px;margin-top:4px}
.flow-body{background:#0D1117;border:1px solid #1E293B;border-radius:12px;padding:16px 20px;flex:1}
.flow-title{font-size:14px;font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.flow-desc{color:#64748B;font-size:12px;line-height:1.7}
.flow-children{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px;margin-top:12px}
.flow-child{background:#161B22;border:1px solid #2A3441;border-radius:8px;padding:10px;display:flex;gap:8px}
.flow-child-name{color:#E2E8F0;font-size:11px;font-weight:600;margin-bottom:3px;font-family:monospace}
.flow-child-desc{color:#64748B;font-size:11px;line-height:1.5}
.flow-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.flow-tag{border-radius:4px;padding:2px 8px;font-size:10px;font-family:monospace;border:1px solid}
.flow-arrow{text-align:center;color:#2A3441;font-size:16px;margin:0 0 6px 50px}
@media(max-width:700px){
  #main.panel-open{padding-right:24px}
  #detail-panel{width:100%;top:auto;height:65vh}
  .files-grid{grid-template-columns:1fr}
  .tabs{margin-left:0}
  #stats{flex-wrap:wrap}
  .stat{min-width:33%}
}
</style>
</head>
<body>
<div id="header">
  <div class="logo">⎈</div>

    <button class="tab-btn" onclick="switchTab('namespaces')">📦 Namespaces</button>
    <button class="tab-btn" onclick="switchTab('flow')">🔄 Flujo</button>

</div>
<div id="stats">

<div id="main">

  <div id="tab-diagram" class="tab-content active">

  <div id="tab-namespaces" class="tab-content">

  </div>
  <!-- FLOW -->
  <div id="tab-flow" class="tab-content">
    <div class="flow-wrap" id="flow-container"></div>
  </div>
</div>
<!-- PANEL -->
<div id="detail-panel">
  <button class="dp-close" onclick="closePanel()">← cerrar</button>
  <div class="dp-icon" id="dp-icon"></div>
  <div class="dp-kind" id="dp-kind"></div>
  <div class="dp-name" id="dp-name"></div>
  <div id="dp-image-box" class="dp-image-box" style="display:none"><div class="dp-image-label">Image</div><div class="dp-image-val" id="dp-image"></div></div>
  <div class="dp-desc" id="dp-desc"></div>
  <div id="dp-ports-wrap" style="margin-bottom:16px;display:none"><div class="dp-sec-label">Puertos</div><div class="dp-tags" id="dp-ports"></div></div>
  <div id="dp-connects-wrap" style="margin-bottom:16px;display:none"><div class="dp-sec-label">Conecta con</div><div class="dp-tags" id="dp-connects"></div></div>
  <div id="dp-concepts-wrap" style="display:none"><div class="dp-sec-label">Conceptos K8s</div><div class="dp-tags" id="dp-concepts"></div></div>
</div>
<div id="conn-tip"></div>

// ── DIAGRAM ───────────────────────────────────────────────────────────────────
function setLayer(layer){
  curLayer=layer;
  document.querySelectorAll('.flt-btn').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  renderDiagram();
}

function nodeOp(n){ return curLayer==='all'||n.layer===curLayer?1:0.1; }
function edgeOp(e){
  if(curLayer==='all') return 1;
  const fn=NODES.find(n=>n.id===e.f), tn=NODES.find(n=>n.id===e.t);
  return (fn&&fn.layer===curLayer)||(tn&&tn.layer===curLayer)?1:0.04;
}

function renderDiagram(){
  const svg=document.getElementById('arch-svg');
  const nm={};NODES.forEach(n=>nm[n.id]=n);
  const NW=125,NH=56;
  svg.innerHTML=`<defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#334155"/></marker>
    <marker id="arr-hi" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#7DD3FC"/></marker>
  </defs>`;

  // edges
  const edgeGroups=[];
  EDGES.forEach((e)=>{
    const f=nm[e.f],t=nm[e.t];if(!f||!t)return;
    const fx=f.x+NW/2,fy=f.y+NH/2,tx=t.x+NW/2,ty=t.y+NH/2;
    const mx=(fx+tx)/2,my=(fy+ty)/2;
    const g=document.createElementNS('http://www.w3.org/2000/svg','g');
    g.style.opacity=edgeOp(e);g.style.transition='opacity .25s';
    const ln=document.createElementNS('http://www.w3.org/2000/svg','line');
    ln.setAttribute('x1',fx);ln.setAttribute('y1',fy);ln.setAttribute('x2',tx);ln.setAttribute('y2',ty);
    ln.setAttribute('stroke','#2A3441');ln.setAttribute('stroke-width','1.5');ln.setAttribute('stroke-dasharray','4 3');
    ln.setAttribute('marker-end','url(#arr)');ln.classList.add('eln');g.appendChild(ln);
    (e.l||'').split('\n').forEach((l,i)=>{
      const tx2=document.createElementNS('http://www.w3.org/2000/svg','text');
      tx2.setAttribute('x',mx);tx2.setAttribute('y',my+12+i*11);
      tx2.setAttribute('fill','#334155');tx2.setAttribute('font-size','8');
      tx2.setAttribute('text-anchor','middle');tx2.setAttribute('font-family','monospace');
      tx2.classList.add('elbl');tx2.textContent=l;g.appendChild(tx2);
    });
    g._from=e.f;g._to=e.t;g._label=e.l||'';
    edgeGroups.push(g);svg.appendChild(g);
  });

  // nodes
  NODES.forEach(node=>{
    const g=document.createElementNS('http://www.w3.org/2000/svg','g');
    g.style.cursor='pointer';g.style.opacity=nodeOp(node);g.style.transition='opacity .25s';

    const rect=document.createElementNS('http://www.w3.org/2000/svg','rect');
    rect.setAttribute('x',node.x);rect.setAttribute('y',node.y);
    rect.setAttribute('width',NW);rect.setAttribute('height',NH);
    rect.setAttribute('rx','8');rect.setAttribute('fill','#0D1117');
    rect.setAttribute('stroke','#2A3441');rect.setAttribute('stroke-width','1');
    rect.style.transition='all .2s';g.appendChild(rect);

    const ico=document.createElementNS('http://www.w3.org/2000/svg','text');
    ico.setAttribute('x',node.x+9);ico.setAttribute('y',node.y+22);ico.setAttribute('font-size','17');ico.textContent=node.icon;g.appendChild(ico);

    node.label.split('\n').forEach((l,i)=>{
      const t=document.createElementNS('http://www.w3.org/2000/svg','text');
      t.setAttribute('x',node.x+NW/2);t.setAttribute('y',node.y+30+i*13);
      t.setAttribute('fill','#94A3B8');t.setAttribute('font-size',i===0?'10':'8');
      t.setAttribute('font-weight',i===0?'600':'400');t.setAttribute('text-anchor','middle');
      t.setAttribute('font-family',i===0?'inherit':'monospace');t.classList.add('ntxt');t.textContent=l;g.appendChild(t);
    });

    if(node.ns){
      const ns=document.createElementNS('http://www.w3.org/2000/svg','text');
      ns.setAttribute('x',node.x+NW/2);ns.setAttribute('y',node.y+NH+14);
      ns.setAttribute('fill',node.color);ns.setAttribute('font-size','7');
      ns.setAttribute('text-anchor','middle');ns.setAttribute('opacity','0.5');ns.textContent=node.ns;g.appendChild(ns);
    }

    // hover
    g.addEventListener('mouseenter',function(ev){
      const connected=new Set();
      EDGES.forEach(e=>{if(e.f===node.id)connected.add(e.t);if(e.t===node.id)connected.add(e.f);});
      // highlight node
      rect.setAttribute('fill',node.color+'22');rect.setAttribute('stroke',node.color);rect.setAttribute('stroke-width','2');
      g.querySelectorAll('.ntxt').forEach(t=>t.setAttribute('fill',node.color));
      // edges
      edgeGroups.forEach(eg=>{
        const conn=eg._from===node.id||eg._to===node.id;
        eg.style.opacity=conn?1:0.03;
        if(conn){
          eg.querySelector('.eln').setAttribute('stroke',node.color+'99');
          eg.querySelector('.eln').setAttribute('stroke-width','2');
          eg.querySelector('.eln').setAttribute('stroke-dasharray','6 2');
          eg.querySelector('.eln').setAttribute('marker-end','url(#arr-hi)');
          eg.querySelectorAll('.elbl').forEach(l=>l.setAttribute('fill','#7DD3FC'));
        }
      });
      // dim other nodes
      svg.querySelectorAll('g[data-nid]').forEach(ng=>{
        if(ng.getAttribute('data-nid')!==node.id&&!connected.has(ng.getAttribute('data-nid')))
          ng.style.opacity='0.1';
      });
      // tooltip
      const conns=EDGES.filter(e=>e.f===node.id||e.t===node.id);
      const tip=document.getElementById('conn-tip');
      if(conns.length){
        tip.innerHTML='<div style="color:#E2E8F0;font-weight:700;margin-bottom:6px;font-size:12px">'+node.label.replace('\n',' ')+'</div>'+
          conns.map(e=>{
            const other=nm[e.f===node.id?e.t:e.f];
            const dir=e.f===node.id?'→':'←';
            return `<div style="margin-bottom:4px;display:flex;align-items:center;gap:6px">
              <span style="color:#475569;font-size:13px">${dir}</span>
              <span style="color:${other.color}">${other.label.replace('\n',' ')}</span>
              <span style="color:#334155;font-size:10px">${e.l.replace('\n',' ')}</span>
            </div>`;
          }).join('');
        tip.style.display='block';
        tip.style.left=(ev.clientX+18)+'px';tip.style.top=(ev.clientY-10)+'px';
      }
    });

    g.addEventListener('mousemove',function(ev){
      const tip=document.getElementById('conn-tip');
      if(tip.style.display==='block'){tip.style.left=(ev.clientX+18)+'px';tip.style.top=(ev.clientY-10)+'px';}
    });

    g.addEventListener('mouseleave',function(){
      rect.setAttribute('fill','#0D1117');rect.setAttribute('stroke','#2A3441');rect.setAttribute('stroke-width','1');
      g.querySelectorAll('.ntxt').forEach(t=>t.setAttribute('fill','#94A3B8'));
      edgeGroups.forEach(eg=>{
        eg.style.opacity=edgeOp({f:eg._from,t:eg._to});
        eg.querySelector('.eln').setAttribute('stroke','#2A3441');
        eg.querySelector('.eln').setAttribute('stroke-width','1.5');
        eg.querySelector('.eln').setAttribute('stroke-dasharray','4 3');
        eg.querySelector('.eln').setAttribute('marker-end','url(#arr)');
        eg.querySelectorAll('.elbl').forEach(l=>l.setAttribute('fill','#334155'));
      });
      svg.querySelectorAll('g[data-nid]').forEach(ng=>ng.style.opacity=nodeOp(NODES.find(n=>n.id===ng.getAttribute('data-nid'))||{}));
      document.getElementById('conn-tip').style.display='none';
    });

    g.addEventListener('click',()=>selectNode(node));
    g.setAttribute('data-nid',node.id);
    svg.appendChild(g);
  });
}

function selectNode(node){
  const ns=NS[node.ns];
  if(ns){const pod=ns.pods.find(p=>p.id===node.id);if(pod){openPanel(pod,'pod',NSC[node.ns]);return;}}
  openPanel({icon:node.icon,name:node.label.replace('\n',' '),kind:node.ns||'sistema',desc:`Componente del namespace ${node.ns||'sistema'}`,image:null,ports:[],connects:[]},
    'pod',{accent:node.color,text:node.color,bg:'#1E293B'});
}

        <div class="pod-icon">${p.icon}</div>
        <div class="pod-name" style="color:${c.text}">${p.name}</div>
        <div class="pod-badges"><span class="pod-badge" style="background:${c.accent}22;color:${c.accent}">${p.kind}</span><span class="pod-badge" style="background:#1E293B;color:#64748B">${p.replicas}</span></div>
        ${ps?`<div class="pod-ports">${ps}</div>`:''}
      </button>`;
    }).join('');
    return `<div class="ns-block" style="background:${c.bg}88;border-color:${c.border}44">
      <button class="ns-header" onclick="toggleNs('${k}')">
        <div class="ns-header-left">
          <div class="ns-dot" style="background:${c.accent};box-shadow:0 0 8px ${c.accent}"></div>
          <span class="ns-title" style="color:${c.text}">namespace/${k}</span>
          <span class="ns-desc">${ns.desc}</span>
        </div>
        <div class="ns-right">
          <span class="ns-count" style="background:${c.accent}22;color:${c.accent};border-color:${c.accent}44">${ns.pods.length} pod${ns.pods.length!==1?'s':''}</span>
          <span id="nstog-${k}" style="color:#475569">${nsExp[k]?'▲':'▼'}</span>
        </div>
      </button>
      <div id="nb-${k}" style="${nsExp[k]?'':'display:none'}" class="ns-body">${pods}</div>
    </div>`;
  }).join('');
}
function openPodPanel(k,id){openPanel(NS[k].pods.find(p=>p.id===id),'pod',NSC[k]);}
function toggleNs(k){
  nsExp[k]=!nsExp[k];
  document.getElementById('nb-'+k).style.display=nsExp[k]?'grid':'none';
  document.getElementById('nstog-'+k).textContent=nsExp[k]?'▲':'▼';
}

// ── FLOW ──────────────────────────────────────────────────────────────────────
function buildFlow(){
  const steps=[
    {num:"1",color:"#3B82F6",icon:"👤",title:"El usuario hace una petición",
     desc:"El navegador escribe <code style='color:#7DD3FC;background:#1E293B;padding:1px 5px;border-radius:3px'>https://wp-k8s.local</code>. La petición sale hacia el clúster cifrada con TLS.",
     tags:[{l:"HTTPS",c:"#3B82F6"},{l:"DNS local /etc/hosts",c:"#64748B"}]},
    {num:"2",color:"#06B6D4",icon:"🚪",title:"NGINX Ingress — única puerta de entrada",
     desc:"Primera parada dentro del clúster. El Ingress descifra el TLS (el certificado lo gestiona cert-manager automáticamente), lee el Host header y enruta: <code style='color:#7DD3FC;background:#1E293B;padding:1px 5px;border-radius:3px'>wp-k8s.local</code> → WordPress · <code style='color:#7DD3FC;background:#1E293B;padding:1px 5px;border-radius:3px'>grafana.*</code> → Grafana.",
     tags:[{l:"TLS termination",c:"#EC4899"},{l:"Host-based routing",c:"#06B6D4"},{l:"cert-manager auto-renew",c:"#EC4899"}]},
    {num:"3",color:"#3B82F6",icon:"🌐",title:"WordPress procesa la petición",
     desc:"PHP-FPM ejecuta el código. Para responder necesita tres recursos externos:",
     tags:[{l:"PHP-FPM",c:"#3B82F6"},{l:"runAsUser:33",c:"#64748B"},{l:"readOnlyRootFS",c:"#64748B"}],
     children:[
       {icon:"🗄️",name:"MariaDB :3306",desc:"Lee y escribe en la BD. Siempre va al primary (mariadb-0). Si la réplica falla, el servicio sigue."},
       {icon:"⚡",name:"Redis Sentinel :26379",desc:"Caché de sesiones. WordPress pregunta al Sentinel qué pod es el master — failover transparente."},
       {icon:"🗃️",name:"MinIO S3 :9000",desc:"Uploads de imágenes van directo a MinIO. Los pods WordPress son completamente stateless."},
     ]},
    {num:"4",color:"#10B981",icon:"📈",title:"KEDA escala WordPress automáticamente",
     desc:"Mientras llegan peticiones, KEDA pregunta a Prometheus cuántos req/s entran al Ingress. Si superan 100 req/s crea nuevas réplicas (máx 10) <strong style='color:#E2E8F0'>antes</strong> de que la CPU se dispare — más proactivo que el HPA tradicional.",
     tags:[{l:"threshold: 100 req/s",c:"#10B981"},{l:"min:2 max:10 réplicas",c:"#10B981"},{l:"CPU fallback >70%",c:"#64748B"}]},
    {num:"5",color:"#10B981",icon:"👁️",title:"Observabilidad — siempre activa en segundo plano",
     desc:"Los tres pilares recogen datos de forma continua e independiente al tráfico de usuario:",
     tags:[{l:"métricas",c:"#10B981"},{l:"logs",c:"#10B981"},{l:"trazas",c:"#10B981"}],
     children:[
       {icon:"📊",name:"Prometheus cada 15s",desc:"Scrape de todos los pods. SLOs: disponibilidad ≥99.5% y latencia p95 ≤2s. Si se rompen → Alertmanager → Slack."},
       {icon:"🔍",name:"Promtail → Loki",desc:"DaemonSet en cada nodo. Centraliza logs de todos los contenedores con retención 31 días."},
       {icon:"🔗",name:"OTel → Jaeger",desc:"WordPress envía trazas PHP. OTel las agrupa y las manda a Jaeger para análisis de latencia."},
     ]},
    {num:"6",color:"#F97316",icon:"💾",title:"Backup automático — cada noche sin intervención",
     desc:"Tres procesos programados protegen los datos:",
     tags:[{l:"RPO ~24h",c:"#F97316"},{l:"RTO ~15min",c:"#F97316"}],
     children:[
       {icon:"🗄️",name:"2:00 AM — MariaDB dump",desc:"mysqldump completo comprimido → MinIO bucket wordpress-backups."},
       {icon:"🗃️",name:"3:00 AM — Uploads WP",desc:"tar.gz del PVC de uploads → MinIO. Los archivos de media quedan respaldados."},
       {icon:"💾",name:"1:00 AM — Velero snapshot",desc:"Backup completo del clúster: todos los objetos K8s + snapshots PVCs → MinIO bucket velero-backups."},
     ]},
    {num:"7",color:"#10B981",icon:"📈",title:"El operador consulta Grafana",
     desc:"Un único punto de acceso. Desde un pico en la gráfica de errores puedes saltar al log del pod en ese momento exacto, y desde el log a la traza PHP que causó el fallo — los tres datasources correlacionados.",
     tags:[{l:"Prometheus datasource",c:"#10B981"},{l:"Loki datasource",c:"#10B981"},{l:"Jaeger datasource",c:"#10B981"},{l:"grafana.monitoring.local",c:"#64748B"}]},
  ];

  let html='<div class="flow-wrap">';
  steps.forEach((s,i)=>{
    const last=i===steps.length-1;
    html+=`<div class="flow-step">
      <div class="flow-left">
        <div class="flow-num" style="color:${s.color};border-color:${s.color};background:${s.color}15">${s.num}</div>
        ${!last?`<div class="flow-vline" style="background:linear-gradient(${s.color}80,transparent)"></div>`:''}
      </div>
      <div class="flow-body" style="border-color:${s.color}33">
        <div class="flow-title" style="color:${s.color}"><span style="font-size:20px">${s.icon}</span>${s.title}</div>
        <div class="flow-desc">${s.desc}</div>`;
    if(s.children){
      html+='<div class="flow-children">';
      s.children.forEach(c=>{html+=`<div class="flow-child"><span style="font-size:18px;flex-shrink:0">${c.icon}</span><div><div class="flow-child-name">${c.name}</div><div class="flow-child-desc">${c.desc}</div></div></div>`;});
      html+='</div>';
    }
    if(s.tags){
      html+='<div class="flow-tags">';
      s.tags.forEach(t=>{html+=`<span class="flow-tag" style="color:${t.c};background:${t.c}15;border-color:${t.c}33">${t.l}</span>`;});
      html+='</div>';
    }
    html+='</div></div>';
    if(!last) html+='<div class="flow-arrow">↓</div>';
  });
  html+='</div>';
  document.getElementById('flow-container').innerHTML=html;
}

// ── PANEL ─────────────────────────────────────────────────────────────────────
function openPanel(item,type,c){
  c=c||{accent:'#3B82F6',text:'#93C5FD',bg:'#1E293B'};
  const panel=document.getElementById('detail-panel');
  panel.style.borderLeft=`1px solid ${c.accent}44`;panel.style.boxShadow=`-8px 0 32px ${c.accent}22`;
  document.getElementById('dp-icon').textContent=item.icon||'📦';
  document.getElementById('dp-kind').textContent=type==='pod'?item.kind:item.category;
  document.getElementById('dp-kind').style.color=c.accent;
  document.getElementById('dp-name').textContent=item.name;
  const ib=document.getElementById('dp-image-box');
  if(item.image){document.getElementById('dp-image').textContent=item.image;ib.style.display='block';}else ib.style.display='none';
  document.getElementById('dp-desc').textContent=item.desc||'';
  const pw=document.getElementById('dp-ports-wrap'),pt=document.getElementById('dp-ports');
  if(item.ports&&item.ports.length){
    pt.innerHTML=item.ports.map(p=>{const o=typeof p==='object'?p:{p,proto:'TCP',desc:''};
      return `<div class="dp-connect-item" style="border-color:${c.accent}33"><span style="color:${c.text};font-size:12px;font-family:monospace">:${o.p} <span style="color:${c.accent};font-size:10px">${o.proto}</span></span>${o.desc?`<span class="dp-connect-proto">${o.desc}</span>`:''}</div>`;
    }).join('');pw.style.display='block';
  }else pw.style.display='none';
  const cw=document.getElementById('dp-connects-wrap'),ct=document.getElementById('dp-connects');
  const conns=item.connects||[];
  if(conns.length){
    ct.innerHTML=conns.map(x=>{const o=typeof x==='object'?x:{to:x,proto:'',desc:''};
      return `<div class="dp-connect-item"><span style="color:#E2E8F0;font-size:11px;font-family:monospace">${o.to}</span>${o.proto?`<span class="dp-connect-proto">${o.proto}${o.desc?' — '+o.desc:''}</span>`:''}</div>`;
    }).join('');cw.style.display='block';
  }else cw.style.display='none';
  const xw=document.getElementById('dp-concepts-wrap'),xt=document.getElementById('dp-concepts');
  if(item.concepts&&item.concepts.length){xt.innerHTML=item.concepts.map(c2=>`<span class="dp-concept">${c2}</span>`).join('');xw.style.display='block';}else xw.style.display='none';
  panel.classList.add('open');document.getElementById('main').classList.add('panel-open');
}

function closePanel(){
  document.getElementById('detail-panel').classList.remove('open');
  document.getElementById('main').classList.remove('panel-open');
}

// ── INIT ──────────────────────────────────────────────────────────────────────
renderDiagram();
buildLegend();
buildFiles();
buildNamespaces();
buildFlow();
</script>
