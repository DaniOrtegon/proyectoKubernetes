# ============================================================
# 18-backup.yaml — Backup y Recuperación ante Desastres
#
# ESTRATEGIA:
#   - MariaDB: mysqldump diario a las 2:00 AM → MinIO
#   - WordPress uploads: sync diario a las 3:00 AM → MinIO
#   - Retención: 30 días
#   - RTO (Recovery Time Objective): ~15 minutos
#   - RPO (Recovery Point Objective): ~24 horas (backup diario)
#
# DESTINO: MinIO bucket 'wordpress-backups' (namespace storage)
#   - mariadb/wordpress_YYYYMMDD_HHMMSS.sql.gz
#   - uploads/wordpress-uploads_YYYYMMDD_HHMMSS.tar.gz
#
# RESTAURACIÓN:
#   kubectl exec -n databases mariadb-0 -- \
#     mysql -u root -p"${PASS}" < backup.sql
# ============================================================

# ------------------------------------------------------------
# CronJob 1: Backup diario de MariaDB → MinIO
# Genera un dump completo con mysqldump y lo sube comprimido a MinIO
# ------------------------------------------------------------
apiVersion: batch/v1
kind: CronJob
metadata:
  name: mariadb-backup
  namespace: databases
  labels:
    app: mariadb-backup
    app.kubernetes.io/part-of: wordpress-ha
    app.kubernetes.io/component: backup
spec:
  schedule: "0 2 * * *"          # Cada día a las 2:00 AM — hora de menor tráfico
  timeZone: "Europe/Madrid"       # Interpreta el schedule en hora española, no en UTC
  successfulJobsHistoryLimit: 7   # Conserva logs de los últimos 7 backups exitosos para auditoría
  failedJobsHistoryLimit: 3       # Conserva logs de los últimos 3 fallos para diagnóstico
  concurrencyPolicy: Forbid       # No lanza una nueva ejecución si la anterior sigue en curso (evita backups solapados)
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: mariadb-backup
        spec:
          restartPolicy: OnFailure   # Reintenta si el pod falla (ej: MariaDB no disponible temporalmente)
          containers:
            - name: backup
              image: mariadb:10.6
              imagePullPolicy: Never
              command:
                - /bin/bash
                - -c
                - |
                  set -e   # Aborta el script si cualquier comando falla
                  DATE=$(date +%Y%m%d_%H%M%S)
                  BACKUP_FILE="wordpress_${DATE}.sql.gz"
                  MINIO_URL="http://minio.storage.svc.cluster.local:9000"

                  echo "=== Iniciando backup MariaDB: $BACKUP_FILE ==="

                  # mysqldump con --single-transaction: garantiza consistencia sin bloquear tablas InnoDB
                  # --routines, --triggers, --events: incluye objetos almacenados además de tablas y datos
                  mysqldump \
                    -h mariadb.databases.svc.cluster.local \
                    -u root -p"${MYSQL_ROOT_PASSWORD}" \
                    --all-databases \
                    --single-transaction \
                    --routines \
                    --triggers \
                    --events \
                    | gzip > /tmp/${BACKUP_FILE}   # Comprime al vuelo sin guardar el dump sin comprimir

                  BACKUP_SIZE=$(du -sh /tmp/${BACKUP_FILE} | cut -f1)
                  echo "Backup generado: ${BACKUP_SIZE}"

                  # Sube a MinIO via HTTP PUT (API S3) usando curl
                  # No requiere instalar el cliente 'mc': curl ya está en la imagen mariadb:10.6
                  curl -s --fail \
                    -X PUT \
                    -H "Content-Type: application/gzip" \
                    -u "${MINIO_ACCESS_KEY}:${MINIO_SECRET_KEY}" \
                    --data-binary @/tmp/${BACKUP_FILE} \
                    "${MINIO_URL}/wordpress-backups/mariadb/${BACKUP_FILE}" \
                    || { echo "❌ Error subiendo a MinIO"; exit 1; }

                  echo "✅ Backup subido a MinIO: mariadb/${BACKUP_FILE}"
                  rm -f /tmp/${BACKUP_FILE}   # Limpia el fichero temporal del pod

                  # Lista los últimos backups disponibles para confirmar el estado del bucket
                  echo "=== Backups disponibles en MinIO ==="
                  curl -s \
                    -u "${MINIO_ACCESS_KEY}:${MINIO_SECRET_KEY}" \
                    "${MINIO_URL}/wordpress-backups/?prefix=mariadb/&list-type=2" \
                    | grep -oP '(?<=<Key>)[^<]+' | tail -5 || true

                  echo "=== Backup completado ==="
              env:
                - name: MYSQL_ROOT_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: mariadb-secret
                      key: mariadb-root-password   # Secret definido en 01-secrets.yaml
                - name: MINIO_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: minio-secret
                      key: access-key              # Secret de MinIO en namespace 'databases' (creado en 16-minio.yaml)
                - name: MINIO_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: minio-secret
                      key: secret-key
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 256Mi

---
# ------------------------------------------------------------
# CronJob 2: Backup diario de uploads WordPress → MinIO
# Comprime el directorio de uploads montado desde el PVC de WordPress
# ------------------------------------------------------------
apiVersion: batch/v1
kind: CronJob
metadata:
  name: wordpress-uploads-backup
  namespace: wordpress
  labels:
    app: wordpress-backup
    app.kubernetes.io/part-of: wordpress-ha
    app.kubernetes.io/component: backup
spec:
  schedule: "0 3 * * *"          # Cada día a las 3:00 AM — 1 hora después del backup de MariaDB
  timeZone: "Europe/Madrid"
  successfulJobsHistoryLimit: 7
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: wordpress-backup
        spec:
          restartPolicy: OnFailure
          containers:
            - name: backup
              image: alpine:3.18   # Imagen ligera; instala curl, tar y gzip bajo demanda
              imagePullPolicy: Never
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  DATE=$(date +%Y%m%d_%H%M%S)
                  BACKUP_FILE="wordpress-uploads_${DATE}.tar.gz"
                  MINIO_URL="http://minio.storage.svc.cluster.local:9000"

                  echo "=== Iniciando backup uploads WordPress: $BACKUP_FILE ==="
                  apk add --no-cache curl tar gzip --quiet   # Instala herramientas necesarias en Alpine

                  # Comprime el directorio de uploads montado desde el PVC en modo readOnly
                  tar -czf /tmp/${BACKUP_FILE} \
                    -C /var/www/html/wp-content/uploads . \
                    2>/dev/null || { echo "❌ Error comprimiendo uploads"; exit 1; }

                  BACKUP_SIZE=$(du -sh /tmp/${BACKUP_FILE} | cut -f1)
                  echo "Backup generado: ${BACKUP_SIZE}"

                  curl -s --fail \
                    -X PUT \
                    -H "Content-Type: application/gzip" \
                    -u "${MINIO_ACCESS_KEY}:${MINIO_SECRET_KEY}" \
                    --data-binary @/tmp/${BACKUP_FILE} \
                    "${MINIO_URL}/wordpress-backups/uploads/${BACKUP_FILE}" \
                    || { echo "❌ Error subiendo a MinIO"; exit 1; }

                  echo "✅ Backup subido a MinIO: uploads/${BACKUP_FILE}"
                  rm -f /tmp/${BACKUP_FILE}
                  echo "=== Backup uploads completado ==="
              env:
                - name: MINIO_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: minio-secret
                      key: access-key
                - name: MINIO_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: minio-secret
                      key: secret-key
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 128Mi
              volumeMounts:
                - name: wordpress-storage
                  mountPath: /var/www/html/wp-content/uploads
                  subPath: wp-content/uploads   # Monta solo el subdirectorio de uploads, no todo el PVC
                  readOnly: true                # Protección: el backup no puede modificar los datos originales
          volumes:
            - name: wordpress-storage
              persistentVolumeClaim:
                claimName: wordpress-pvc   # PVC compartido con los pods de WordPress (definido en 03-pvc.yaml)

---
# ------------------------------------------------------------
# CronJob 3: Limpieza de backups antiguos (>30 días)
# Se ejecuta los domingos a las 4:00 AM — no diariamente para
# evitar el riesgo de eliminar el último backup ante un fallo
# del CronJob de creación durante varios días consecutivos.
# ------------------------------------------------------------
apiVersion: batch/v1
kind: CronJob
metadata:
  name: backup-cleanup
  namespace: storage
  labels:
    app: backup-cleanup
    app.kubernetes.io/part-of: wordpress-ha
    app.kubernetes.io/component: backup
spec:
  schedule: "0 4 * * 0"          # Cada domingo a las 4:00 AM
  timeZone: "Europe/Madrid"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: backup-cleanup
        spec:
          restartPolicy: OnFailure
          containers:
            - name: cleanup
              image: minio/mc:latest
              imagePullPolicy: Never
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  echo "=== Limpiando backups antiguos (>30 días) ==="

                  # Configura el alias del cliente mc apuntando a MinIO
                  mc alias set local \
                    http://minio.storage.svc.cluster.local:9000 \
                    "${MINIO_ROOT_USER}" "${MINIO_ROOT_PASSWORD}"

                  # Busca y elimina backups de MariaDB con más de 30 días
                  mc find local/wordpress-backups/mariadb \
                    --older-than 30d \
                    --exec "mc rm {}" || true   # '|| true' evita fallo si no hay ficheros que limpiar

                  # Busca y elimina backups de uploads con más de 30 días
                  mc find local/wordpress-backups/uploads \
                    --older-than 30d \
                    --exec "mc rm {}" || true

                  echo "=== Limpieza completada ==="
                  echo "Backups actuales:"
                  mc ls local/wordpress-backups/mariadb/ | tail -5 || true
                  mc ls local/wordpress-backups/uploads/ | tail -5 || true
              env:
                - name: MINIO_ROOT_USER
                  valueFrom:
                    secretKeyRef:
                      name: minio-secret
                      key: root-user     # Usa credenciales de root para administración del bucket
                - name: MINIO_ROOT_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: minio-secret
                      key: root-password
              resources:
                requests:
                  cpu: 50m
                  memory: 32Mi
                limits:
                  cpu: 100m
                  memory: 64Mi

---
# ------------------------------------------------------------
# Job de restauración manual de MariaDB
# USO:
#   1. Editar BACKUP_FILE con el nombre del backup a restaurar
#   2. Cambiar suspend: true → suspend: false
#   3. kubectl apply -f 18-backup.yaml
#   4. kubectl logs -n databases job/mariadb-restore-manual -f
#   5. kubectl delete job mariadb-restore-manual -n databases
# ------------------------------------------------------------
apiVersion: batch/v1
kind: Job
metadata:
  name: mariadb-restore-manual
  namespace: databases
  labels:
    app: mariadb-restore
    app.kubernetes.io/part-of: wordpress-ha
    app.kubernetes.io/component: restore
spec:
  suspend: true   # IMPORTANTE: suspendido por defecto — cambiar a false solo para ejecutar una restauración
  ttlSecondsAfterFinished: 600   # Limpieza automática del Job 10 minutos después de completarse
  template:
    metadata:
      labels:
        app: mariadb-backup
    spec:
      restartPolicy: OnFailure
      containers:
        - name: restore
          image: mariadb:10.6
          imagePullPolicy: Never
          command:
            - /bin/bash
            - -c
            - |
              set -e
              MINIO_URL="http://minio.storage.svc.cluster.local:9000"

              # Salvaguarda: verifica que se ha especificado un backup real antes de proceder
              if [ "${BACKUP_FILE}" = "CHANGE_ME.sql.gz" ]; then
                echo "❌ ERROR: Especifica BACKUP_FILE con el nombre del backup"
                echo "Backups disponibles:"
                curl -s -u "${MINIO_ACCESS_KEY}:${MINIO_SECRET_KEY}" \
                     "${MINIO_URL}/wordpress-backups/?prefix=mariadb/" \
                  | grep -oP '(?<=<Key>)[^<]+' || true
                exit 1
              fi

              echo "=== Restaurando: ${BACKUP_FILE} ==="
              # Descarga, descomprime y restaura en un pipeline sin ficheros temporales
              curl -s --fail \
                -u "${MINIO_ACCESS_KEY}:${MINIO_SECRET_KEY}" \
                "${MINIO_URL}/wordpress-backups/mariadb/${BACKUP_FILE}" \
                | gunzip \
                | mysql \
                    -h mariadb.databases.svc.cluster.local \
                    -u root -p"${MYSQL_ROOT_PASSWORD}" \
                    2>/dev/null

              echo "✅ Restauración completada desde: ${BACKUP_FILE}"
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mariadb-secret
                  key: mariadb-root-password
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: access-key
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: secret-key
            - name: BACKUP_FILE
              value: "CHANGE_ME.sql.gz"   # EDITAR: sustituir por el nombre del fichero de backup a restaurar
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
