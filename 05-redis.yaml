# ============================================================
# R-7: PersistentVolumeClaim para Redis
# Evita pérdida de sesiones al reiniciar el Pod.
# Redis en modo AOF (append-only) persiste cada operación de escritura.
# ============================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-pvc
  namespace: databases
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: wordpress-ha
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: standard

---
# ============================================================
# Deployment para Redis en el namespace 'databases'
# Redis actúa como caché para WordPress, mejorando su rendimiento
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: databases
  labels:
    app: redis
    app.kubernetes.io/name: redis
    app.kubernetes.io/version: "6.2"
    app.kubernetes.io/part-of: wordpress-ha
    app.kubernetes.io/component: cache
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
        app.kubernetes.io/name: redis
        app.kubernetes.io/part-of: wordpress-ha
    spec:
      containers:
        - name: redis
          image: redis:6.2-alpine
          # R-7: --appendonly yes activa persistencia AOF en /data
          command: ["redis-server", "--requirepass", "$(REDIS_PASSWORD)", "--appendonly", "yes", "--appendfsync", "everysec"]
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: redis-password
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            # R-7: Datos AOF montados en /data para sobrevivir reinicios del Pod
            - name: redis-storage
              mountPath: /data
      volumes:
        - name: redis-storage
          persistentVolumeClaim:
            claimName: redis-pvc

---
# ============================================================
# Servicio para Redis en el namespace 'databases'
# WordPress lo alcanza via FQDN: redis.databases.svc.cluster.local
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: databases
  labels:
    app: redis
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: wordpress-ha
    app.kubernetes.io/component: cache
spec:
  ports:
    - port: 6379
      targetPort: 6379
  selector:
    app: redis
