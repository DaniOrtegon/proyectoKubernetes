# ============================================================
# Deployment para Redis en el namespace 'databases'
# Redis actúa como caché para WordPress, mejorando su rendimiento
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: databases  # Mismo namespace que MariaDB
  labels:
    app: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:6.2-alpine  # Alpine es más ligero, ideal para entornos de prácticas
          ports:
            - containerPort: 6379  # Puerto estándar de Redis
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          # Redis por defecto almacena datos en memoria (caché).
          # Solo añade persistencia con PVC si necesitas que los datos
          # sobrevivan a reinicios del Pod. Para caché pura no es necesario.

---
# ============================================================
# Servicio para Redis en el namespace 'databases'
# WordPress lo alcanza via FQDN: redis.databases.svc.cluster.local
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: databases
spec:
  ports:
    - port: 6379
      targetPort: 6379
  selector:
    app: redis
