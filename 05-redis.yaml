# ============================================================
# 05-redis.yaml — Redis HA con Sentinel (manual, sin Helm)
#
# ARQUITECTURA:
#   - 1 master (redis-0) + 2 replicas (redis-1, redis-2)
#   - 3 Sentinels (uno por pod via sidecar)
#   - Sentinel quorum = 2 (mayoría de 3)
#   - WordPress se conecta al Sentinel (:26379), no a Redis directamente
#   - El Sentinel redirige siempre al master actual
#
# FAILOVER:
#   Si redis-0 (master) cae:
#     1. Los 2 Sentinels restantes alcanzan quorum
#     2. Eligen una replica como nuevo master (redis-1 o redis-2)
#     3. WordPress reconecta automáticamente via Sentinel
#     4. Sesiones activas se mantienen (datos replicados)
# ============================================================

# ------------------------------------------------------------
# ConfigMap con configuraciones de Redis y Sentinel
# ------------------------------------------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: databases
  labels:
    app: redis
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: wordpress-ha
data:
  # Configuración del master Redis
  redis-master.conf: |
    bind 0.0.0.0
    port 6379
    requirepass Redis#2024!
    masterauth Redis#2024!
    appendonly yes
    appendfsync everysec
    save 900 1
    save 300 10
    save 60 10000
    loglevel notice

  # Configuración de las replicas Redis
  redis-replica.conf: |
    bind 0.0.0.0
    port 6379
    requirepass Redis#2024!
    masterauth Redis#2024!
    replicaof redis-0.redis-headless.databases.svc.cluster.local 6379
    replica-read-only yes
    appendonly yes
    appendfsync everysec
    loglevel notice

  # Configuración de Sentinel (igual para todos los pods)
  sentinel.conf: |
    port 26379
    sentinel monitor mymaster redis-0.redis-headless.databases.svc.cluster.local 6379 2
    sentinel auth-pass mymaster Redis#2024!
    sentinel down-after-milliseconds mymaster 5000
    sentinel failover-timeout mymaster 60000
    sentinel parallel-syncs mymaster 1
    loglevel notice

  # Script de entrypoint que decide si el pod es master o replica
  # basándose en el ordinal del StatefulSet (redis-0 = master)
  start-redis.sh: |
    #!/bin/sh
    ORDINAL=$(echo $HOSTNAME | rev | cut -d'-' -f1 | rev)
    if [ "$ORDINAL" = "0" ]; then
      echo "Arrancando como MASTER"
      exec redis-server /etc/redis/redis-master.conf
    else
      echo "Arrancando como REPLICA (ordinal $ORDINAL)"
      exec redis-server /etc/redis/redis-replica.conf
    fi

---
# ------------------------------------------------------------
# Headless Service para que los pods se resuelvan por FQDN:
# redis-0.redis-headless.databases.svc.cluster.local
# redis-1.redis-headless.databases.svc.cluster.local
# redis-2.redis-headless.databases.svc.cluster.local
# ------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: redis-headless
  namespace: databases
  labels:
    app: redis
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: wordpress-ha
spec:
  clusterIP: None
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
    - name: sentinel
      port: 26379
      targetPort: 26379
  selector:
    app: redis

---
# ------------------------------------------------------------
# Service para Sentinel — WordPress apunta aquí (:26379)
# ClusterIP estable que balancea entre los 3 Sentinels
# ------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: redis-sentinel
  namespace: databases
  labels:
    app: redis
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: wordpress-ha
    app.kubernetes.io/component: sentinel
spec:
  type: ClusterIP
  ports:
    - name: sentinel
      port: 26379
      targetPort: 26379
  selector:
    app: redis

---
# ------------------------------------------------------------
# Service para acceso directo a Redis (usado internamente)
# WordPress NO usa este service — usa redis-sentinel
# ------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: databases
  labels:
    app: redis
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: wordpress-ha
    app.kubernetes.io/component: cache
spec:
  type: ClusterIP
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
  selector:
    app: redis

---
# ------------------------------------------------------------
# StatefulSet: 3 pods (redis-0 master, redis-1/2 replicas)
# Cada pod tiene un sidecar Sentinel
# ------------------------------------------------------------
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: databases
  labels:
    app: redis
    app.kubernetes.io/name: redis
    app.kubernetes.io/version: "6.2"
    app.kubernetes.io/part-of: wordpress-ha
    app.kubernetes.io/component: cache
spec:
  serviceName: redis-headless
  replicas: 3
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
        app.kubernetes.io/name: redis
        app.kubernetes.io/part-of: wordpress-ha
    spec:
      # Anti-affinity: intentar distribuir pods en distintos nodos
      # En Minikube (1 nodo) es preferred, no required
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: redis
                topologyKey: kubernetes.io/hostname
      initContainers:
        # initContainer que hace ejecutable el script de entrypoint
        - name: init-redis
          image: redis:6.2-alpine
          command: ['sh', '-c', 'cp /config/start-redis.sh /scripts/start-redis.sh && chmod +x /scripts/start-redis.sh']
          volumeMounts:
            - name: redis-config
              mountPath: /config
            - name: scripts
              mountPath: /scripts
      containers:
        # Contenedor principal: Redis (master o replica según ordinal)
        - name: redis
          image: redis:6.2-alpine
          command: ['/scripts/start-redis.sh']
          ports:
            - containerPort: 6379
              name: redis
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - redis-cli -a 'Redis#2024!' ping | grep PONG
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - redis-cli -a 'Redis#2024!' ping | grep PONG
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 5
          volumeMounts:
            - name: redis-data
              mountPath: /data
            - name: redis-config
              mountPath: /etc/redis
            - name: scripts
              mountPath: /scripts

        # Sidecar: Sentinel (uno por pod = 3 sentinels en total)
        - name: sentinel
          image: redis:6.2-alpine
          command:
            - sh
            - -c
            - |
              # Copiar conf a directorio escribible (Sentinel modifica el fichero en runtime)
              cp /etc/sentinel/sentinel.conf /data/sentinel.conf
              exec redis-sentinel /data/sentinel.conf
          ports:
            - containerPort: 26379
              name: sentinel
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - redis-cli -p 26379 ping | grep PONG
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: sentinel-config
              mountPath: /etc/sentinel
            - name: sentinel-data
              mountPath: /data

      volumes:
        - name: redis-config
          configMap:
            name: redis-config
            items:
              - key: redis-master.conf
                path: redis-master.conf
              - key: redis-replica.conf
                path: redis-replica.conf
              - key: start-redis.sh
                path: start-redis.sh
        - name: sentinel-config
          configMap:
            name: redis-config
            items:
              - key: sentinel.conf
                path: sentinel.conf
        - name: scripts
          emptyDir: {}
        - name: sentinel-data
          emptyDir: {}

  # PVC por pod — cada réplica tiene su propio volumen
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: standard
        resources:
          requests:
            storage: 2Gi
