# ============================================================
# 01-secrets.yaml — Secrets en texto plano (base64)
#
# ⚠️  IMPORTANTE: Este archivo NO se aplica directamente al clúster.
#     Es la plantilla base que usa deploy.sh para generar los
#     Sealed Secrets via kubeseal. Los archivos que SÍ se aplican
#     son los sealed-*.yaml generados automáticamente.
#
# ⚠️  NUNCA subir este archivo a un repositorio Git público.
#     Los valores base64 NO son cifrado — son trivialmente decodificables:
#     echo "Um9vdERCIzIwMjQh" | base64 -d → RootDB#2024!
#
# FLUJO DE USO:
#   1. deploy.sh lee este archivo como referencia de contraseñas
#   2. Genera los Sealed Secrets con kubeseal (cifrado real)
#   3. Aplica los sealed-*.yaml al clúster
#   4. El Sealed Secrets Controller descifra y crea los Secrets reales
# ============================================================

# ------------------------------------------------------------
# Secret: mariadb-secret (namespace: databases)
# Usado por: StatefulSet MariaDB (mariadb-0 primary, mariadb-1 replica)
# Claves:
#   mariadb-root-password → contraseña del usuario root de MariaDB
#   mariadb-user-password → contraseña del usuario wordpress (acceso a la BD)
# ------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: mariadb-secret
  namespace: databases
type: Opaque  # Tipo genérico para secrets arbitrarios
data:
  # Valores codificados en base64 (NO cifrados)
  mariadb-root-password: Um9vdERCIzIwMjYh   # RootDB#2026!
  mariadb-user-password: V3BVc2VyIzIwMjQh   # WpUser#2024!

---
# ------------------------------------------------------------
# Secret: mariadb-secret (namespace: wordpress)
# Usado por: Deployment WordPress para conectarse a MariaDB
# Nota: solo necesita la contraseña del usuario wordpress,
#       no la de root (principio de mínimo privilegio)
# ------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: mariadb-secret
  namespace: wordpress
type: Opaque
data:
  mariadb-user-password: V3BVc2VyIzIwMjQh   # WpUser#2024!

---
# ------------------------------------------------------------
# Secret: redis-secret (namespace: databases)
# Usado por: StatefulSet Redis y sus Sentinels para autenticación
# ------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: redis-secret
  namespace: databases
type: Opaque
data:
  redis-password: UmVkaXMjMjAyNCE=   # Redis#2024!

---
# ------------------------------------------------------------
# Secret: redis-secret (namespace: wordpress)
# Usado por: Deployment WordPress para conectarse a Redis
#            a través del Sentinel (caché de sesiones y objetos)
# ------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: redis-secret
  namespace: wordpress
type: Opaque
data:
  redis-password: UmVkaXMjMjAyNCE=   # Redis#2024!
