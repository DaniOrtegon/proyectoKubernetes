# ============================================================
# secrets.yaml — Referencia de estructura de Secrets
#
# IMPORTANTE: Este archivo es solo documentacion de referencia.
# NO contiene contrasenas reales y NO se aplica al cluster.
#
# Las contrasenas reales se gestionan asi:
#   1. Se definen en el archivo .env (nunca en el repo)
#   2. setup.sh las propaga a los archivos del proyecto
#   3. deploy.sh genera los Sealed Secrets con kubeseal
#   4. Los sealed-*.yaml (cifrados) se aplican al cluster
#   5. El Sealed Secrets Controller los descifra en runtime
#
# FLUJO COMPLETO:
#   cp .env.example .env -> editar .env -> ./setup.sh -> ./deploy.sh
# ============================================================

apiVersion: v1
kind: Secret
metadata:
  name: mariadb-secret
  namespace: databases
type: Opaque
data:
  mariadb-root-password: <generado por setup.sh + kubeseal>
  mariadb-user-password: <generado por setup.sh + kubeseal>

---
apiVersion: v1
kind: Secret
metadata:
  name: mariadb-secret
  namespace: wordpress
type: Opaque
data:
  mariadb-user-password: <generado por setup.sh + kubeseal>

---
apiVersion: v1
kind: Secret
metadata:
  name: redis-secret
  namespace: databases
type: Opaque
