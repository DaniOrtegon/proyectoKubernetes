# ============================================================
# IMPORTANTE: Para que los namespaceSelector funcionen correctamente,
# los namespaces deben tener la etiqueta 'kubernetes.io/metadata.name'
# que Kubernetes añade automáticamente desde la versión 1.21+.
# Si tu clúster es anterior, añade las etiquetas manualmente:
#   kubectl label namespace wordpress kubernetes.io/metadata.name=wordpress
#   kubectl label namespace databases kubernetes.io/metadata.name=databases
# ============================================================

# ------------------------------------------------------------
# POLÍTICA 1: MariaDB solo acepta tráfico desde WordPress
# Namespace: databases
# ------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-wordpress-to-mariadb
  namespace: databases
spec:
  podSelector:
    matchLabels:
      app: mariadb
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: wordpress  # Solo tráfico del namespace 'wordpress'
          podSelector:
            matchLabels:
              app: wordpress  # Y además solo de los Pods de WordPress (doble restricción)
      ports:
        - protocol: TCP
          port: 3306

---
# ------------------------------------------------------------
# POLÍTICA 2: Redis solo acepta tráfico desde WordPress
# Namespace: databases
# ------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-wordpress-to-redis
  namespace: databases
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: wordpress
          podSelector:
            matchLabels:
              app: wordpress
      ports:
        - protocol: TCP
          port: 6379

---
# ------------------------------------------------------------
# POLÍTICA 3: WordPress puede salir hacia databases (MariaDB y Redis)
# También permite salida al exterior para DNS (puerto 53)
# Namespace: wordpress
# ------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-wordpress-egress
  namespace: wordpress
spec:
  podSelector:
    matchLabels:
      app: wordpress
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - protocol: TCP
          port: 80  # Permite tráfico HTTP entrante (desde el Ingress Controller)
  egress:
    # Permite salida hacia MariaDB en namespace 'databases'
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: databases
          podSelector:
            matchLabels:
              app: mariadb
      ports:
        - protocol: TCP
          port: 3306
    # Permite salida hacia Redis en namespace 'databases'
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: databases
          podSelector:
            matchLabels:
              app: redis
      ports:
        - protocol: TCP
          port: 6379
    # Permite salida hacia MinIO en namespace 'storage'
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: storage
          podSelector:
            matchLabels:
              app: minio
      ports:
        - protocol: TCP
          port: 9000
    # Permite salida a Sentinel (puerto 26379)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: databases
          podSelector:
            matchLabels:
              app: redis
      ports:
        - protocol: TCP
          port: 26379
    # Permite resolución DNS (sin esto WordPress no puede resolver FQDNs)
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

---
# ------------------------------------------------------------
# POLÍTICA 4: Default-deny para namespace 'databases'
# ------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-databases
  namespace: databases
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  egress:
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

---
# ------------------------------------------------------------
# POLÍTICA 5: Default-deny para namespace 'wordpress'
# ------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-wordpress
  namespace: wordpress
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  egress:
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

---
# ------------------------------------------------------------
# POLÍTICA 6: Prometheus puede hacer scrape en namespace 'wordpress'
# ------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scrape-wordpress
  namespace: wordpress
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
          podSelector:
            matchLabels:
              app: prometheus
      ports:
        - protocol: TCP
          port: 80

---
# ------------------------------------------------------------
# POLÍTICA 7: Prometheus puede hacer scrape en namespace 'databases'
# ------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scrape-databases
  namespace: databases
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
          podSelector:
            matchLabels:
              app: prometheus
      ports:
        - protocol: TCP
          port: 9104

---
# ------------------------------------------------------------
# POLÍTICA 8 (M-3): Solo Promtail y Grafana pueden acceder a Loki
# ------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-loki-ingress
  namespace: monitoring
spec:
  podSelector:
    matchLabels:
      app: loki
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: promtail
      ports:
        - protocol: TCP
          port: 3100
    - from:
        - podSelector:
            matchLabels:
              app: grafana
      ports:
        - protocol: TCP
          port: 3100
        - protocol: TCP
          port: 9096

---
# ------------------------------------------------------------
# POLÍTICA 9 (N-3): Prometheus puede alcanzar Alertmanager
# Sin esta regla el default-deny del namespace 'monitoring'
# bloquea el envío de alertas de Prometheus a Alertmanager.
# ------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-to-alertmanager
  namespace: monitoring
spec:
  podSelector:
    matchLabels:
      app: alertmanager
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: prometheus
      ports:
        - protocol: TCP
          port: 9093

---
# Política 12: Comunicación interna entre pods MariaDB (replicación)
# mariadb-1 necesita conectar a mariadb-0:3306 para replicación
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-mariadb-replication
  namespace: databases
spec:
  podSelector:
    matchLabels:
      app: mariadb
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: mariadb
      ports:
        - port: 3306
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: mariadb
      ports:
        - port: 3306
    # DNS
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP

---
# Política 13: default-deny storage namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-storage
  namespace: storage
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP

---
# Política 14: WordPress puede acceder a MinIO (:9000)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-wordpress-to-minio
  namespace: storage
spec:
  podSelector:
    matchLabels:
      app: minio
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: wordpress
          podSelector:
            matchLabels:
              app: wordpress
      ports:
        - port: 9000
    # Job minio-setup necesita acceso interno
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: storage
      ports:
        - port: 9000
        - port: 9001

---
# Política 15: WordPress puede enviar trazas al OTel Collector
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-wordpress-to-otel
  namespace: wordpress
spec:
  podSelector:
    matchLabels:
      app: wordpress
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
          podSelector:
            matchLabels:
              app: otel-collector
      ports:
        - port: 4317
          protocol: TCP
        - port: 4318
          protocol: TCP

---
# Política 16: OTel Collector puede enviar trazas a Jaeger
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-otel-to-jaeger
  namespace: monitoring
spec:
  podSelector:
    matchLabels:
      app: jaeger
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: otel-collector
      ports:
        - port: 4317
        - port: 4318
        - port: 14268
    # Grafana accede a la UI de Jaeger
    - from:
        - podSelector:
            matchLabels:
              app: grafana
      ports:
        - port: 16686

---
# Política 17: CronJob backup MariaDB → acceso a MariaDB y MinIO
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-mariadb-backup-egress
  namespace: databases
spec:
  podSelector:
    matchLabels:
      app: mariadb-backup
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: mariadb
      ports:
        - port: 3306
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: storage
      ports:
        - port: 9000
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP

---
# Política 18: CronJob backup uploads WordPress → acceso a MinIO
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-wordpress-backup-egress
  namespace: wordpress
spec:
  podSelector:
    matchLabels:
      app: wordpress-backup
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: storage
      ports:
        - port: 9000
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP

---
# Política 19: CronJob limpieza → acceso a MinIO
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-backup-cleanup-egress
  namespace: storage
spec:
  podSelector:
    matchLabels:
      app: backup-cleanup
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: minio
      ports:
        - port: 9000
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
