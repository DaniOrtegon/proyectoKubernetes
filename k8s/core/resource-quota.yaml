# ============================================================
# LimitRange para namespace 'wordpress'
# Define valores por defecto para pods que no declaren resources.
# Evita que un pod sin limits consuma recursos ilimitados.
# Se aplica a nivel de Container dentro del namespace.
# ============================================================
apiVersion: v1
kind: LimitRange
metadata:
  name: wordpress-limitrange
  namespace: wordpress
spec:
  limits:
    - type: Container
      default:            # Límites que se asignan automáticamente si el pod no los declara
        cpu: 500m
        memory: 256Mi
      defaultRequest:     # Requests que se asignan automáticamente si el pod no los declara
        cpu: 100m
        memory: 128Mi
      max:                # Techo absoluto: ningún container del namespace puede superar estos valores
        cpu: "1"
        memory: 1Gi

---
# ============================================================
# ResourceQuota para namespace 'wordpress'
# Techo total de recursos que puede consumir el namespace.
# Con HPA maxReplicas: 5 y resources por pod:
#   requests.cpu:    5 * 100m  =  500m  → techo en 1 (1000m)
#   requests.memory: 5 * 256Mi = 1280Mi → techo en 2Gi  ← CORREGIDO (antes 1Gi bloqueaba el 5º pod)
#   limits.cpu:      5 * 500m  = 2500m  → techo en 3
#   limits.memory:   5 * 512Mi = 2560Mi → techo en 3Gi
# ============================================================
apiVersion: v1
kind: ResourceQuota
metadata:
  name: wordpress-quota
  namespace: wordpress
spec:
  hard:
    requests.cpu: "1"          # Suma máxima de CPU requests de todos los pods del namespace
    requests.memory: 2Gi       # Suma máxima de memory requests — calculada para soportar 5 réplicas HPA
    limits.cpu: "3"            # Suma máxima de CPU limits
    limits.memory: 3Gi         # Suma máxima de memory limits
    pods: "10"                 # Máximo número de pods en el namespace (incluye pods de Jobs/CronJobs)
    persistentvolumeclaims: "5" # Máximo número de PVCs en el namespace

---
# ============================================================
# LimitRange para namespace 'databases'
# MariaDB y Redis requieren más memoria que WordPress,
# por eso los defaults son más altos.
# ============================================================
apiVersion: v1
kind: LimitRange
metadata:
  name: databases-limitrange
  namespace: databases
spec:
  limits:
    - type: Container
      default:
        cpu: 500m
        memory: 512Mi      # Default más alto que WordPress: DBs son más intensivas en memoria
      defaultRequest:
        cpu: 100m
        memory: 128Mi
      max:
        cpu: "1"
        memory: 1Gi

---
# ============================================================
# ResourceQuota para namespace 'databases'
# MariaDB + Redis: ambos con replicas: 1
# ============================================================
apiVersion: v1
kind: ResourceQuota
metadata:
  name: databases-quota
  namespace: databases
spec:
  hard:
    # Redis HA: 3 × (128Mi + 32Mi) = 480Mi
    # MariaDB HA: 2 × (256Mi + 64Mi sidecar) = 640Mi
    # Total requests ~1.1Gi → techo en 2Gi
    requests.cpu: "2"
    requests.memory: 2Gi
    # Limits: Redis 3×320Mi=960Mi + MariaDB 2×640Mi=1280Mi = ~2.2Gi → techo en 4Gi
    limits.cpu: "4"
    limits.memory: 4Gi
    # 3 pods redis + 2 pods mariadb = 5 pods mínimo; margen para sidecars y jobs
    pods: "10"
    # 3 PVCs redis + 2 PVCs mariadb = 5 PVCs mínimo; margen para PVCs adicionales
    persistentvolumeclaims: "8"
