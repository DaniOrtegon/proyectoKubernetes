# ============================================================
# PodDisruptionBudget para WordPress
# Garantiza que siempre hay al menos 1 pod disponible durante
# operaciones de mantenimiento (kubectl drain, rolling updates).
# Actúa como contrato entre el operador del clúster y el workload:
# ninguna operación voluntaria puede dejar el Deployment sin pods.
# ============================================================
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: wordpress-pdb
  namespace: wordpress
spec:
  minAvailable: 1          # Al menos 1 pod debe permanecer disponible en todo momento
  selector:
    matchLabels:
      app: wordpress        # Selecciona los pods del Deployment de WordPress (06-wordpress.yaml)
