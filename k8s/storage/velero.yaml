# ============================================================
# velero.yaml — Backup completo del clúster con Velero
#
# ESTRATEGIA:
#   - Backend: MinIO local (bucket: velero-backups)
#   - Schedule: diario a la 1:00 AM (Europe/Madrid)
#   - Namespaces: wordpress + databases
#   - Retención: 30 días (720h)
#   - Incluye: objetos K8s + snapshots de PVCs (CSI)
#
# PRE-REQUISITOS (activados por deploy.sh automáticamente):
#   minikube addons enable volumesnapshots
#   minikube addons enable csi-hostpath-driver
#
# RESTAURACIÓN COMPLETA:
#   velero restore create --from-backup wordpress-daily-<FECHA>
#
# RESTAURACIÓN EN NAMESPACE SEPARADO (para pruebas):
#   velero restore create --from-backup wordpress-daily-<FECHA> \
#     --namespace-mappings wordpress:wordpress-restore
#
# VER BACKUPS DISPONIBLES:
#   velero backup get
#   velero schedule get
# ============================================================

# ------------------------------------------------------------
# Job: Crear bucket velero-backups en MinIO antes de instalar Velero
# Debe ejecutarse después de que MinIO esté listo (minio-setup Job de 16-minio.yaml)
# y antes de instalar Velero via Helm (deploy.sh gestiona este orden).
# ------------------------------------------------------------
apiVersion: batch/v1
kind: Job
metadata:
  name: velero-bucket-setup
  namespace: storage
  labels:
    app: velero-setup
    app.kubernetes.io/part-of: wordpress-ha
    app.kubernetes.io/component: backup
spec:
  ttlSecondsAfterFinished: 300   # Limpieza automática del Job 5 minutos después de completarse
  template:
    metadata:
      labels:
        app: velero-setup
    spec:
      restartPolicy: OnFailure   # Reintenta si MinIO no está disponible todavía
      containers:
        - name: mc
          image: minio/mc:RELEASE.2024-01-16T16-07-38Z
          imagePullPolicy: Never
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "=== Creando bucket velero-backups en MinIO ==="

              # Configura el alias del cliente mc con las credenciales de root de MinIO
              mc alias set local \
                http://minio.storage.svc.cluster.local:9000 \
                "${MINIO_ROOT_USER}" "${MINIO_ROOT_PASSWORD}"

              # Crea el bucket 'velero-backups' si no existe (--ignore-existing es idempotente)
              # Velero almacena aquí los manifiestos YAML de todos los recursos K8s + metadatos de PVC snapshots
              mc mb local/velero-backups --ignore-existing
              echo "✅ Bucket velero-backups listo"

              # Verifica que los buckets están creados correctamente
              mc ls local/
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: access-key       # Nota: usa las claves 'access-key'/'secret-key' (mismo valor que root en desarrollo)
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: secret-key
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi

---
# ------------------------------------------------------------
# NetworkPolicy: Velero puede acceder a MinIO y a la API de K8s
# Restringe el egress del namespace 'velero' a los destinos estrictamente necesarios.
# Sin esta política, en un clúster con NetworkPolicies restrictivas,
# Velero no podría comunicarse con MinIO ni con la API server.
# ------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-velero-egress
  namespace: velero   # Aplica a todos los pods del namespace 'velero' que tengan el label indicado
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: velero   # Selecciona solo los pods de Velero (instalados via Helm)
  policyTypes:
    - Egress   # Solo restringe tráfico saliente; el ingress no está limitado por esta política
  egress:
    # Regla 1: permite acceso a MinIO para leer/escribir backups
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: storage   # Namespace donde corre MinIO
      ports:
        - port: 9000   # Puerto de la API S3 de MinIO
    # Regla 2: permite acceso a la API de Kubernetes para listar, serializar y restaurar recursos
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0   # La API server puede estar en cualquier IP (especialmente en Minikube)
      ports:
        - port: 6443   # Puerto estándar de la API server de Kubernetes
        - port: 443    # Puerto alternativo HTTPS (algunos proveedores cloud usan 443)
    # Regla 3: permite resolución DNS — necesario para resolver 'minio.storage.svc.cluster.local'
    - ports:
        - port: 53
          protocol: UDP   # DNS sobre UDP (consultas estándar)
        - port: 53
          protocol: TCP   # DNS sobre TCP (respuestas grandes que no caben en UDP)
