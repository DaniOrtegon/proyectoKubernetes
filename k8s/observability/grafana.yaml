# ============================================================
# GRAFANA - Namespace: monitoring
# Visualización de métricas (Prometheus) y logs (Loki)
# Acceso: http://<minikube-ip>:30030
# ============================================================

# Almacena la base de datos SQLite de Grafana: usuarios, orgs, alertas y ajustes de la UI
# --- PersistentVolumeClaim para Grafana ---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-pvc
  namespace: monitoring
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: standard

---
# Credenciales del administrador; los valores están en base64 (no cifrados)
# Inyectados como variables de entorno GF_SECURITY_ADMIN_USER y GF_SECURITY_ADMIN_PASSWORD
# --- Secret con credenciales de Grafana ---
apiVersion: v1
kind: Secret
metadata:
  name: grafana-secret
  namespace: monitoring
type: Opaque
data:
  admin-user: YWRtaW4=          # 'admin' en base64
  admin-password: S3ViZW5ldEdyYWZhbmEjMjAwNiE=  # 'admin123' en base64 — CAMBIAR en producción

---
# --- ConfigMap: provisioning de datasources (Prometheus + Loki) ---
# Grafana carga este fichero al arrancar y configura las fuentes de datos automáticamente
# access: proxy — Grafana hace las consultas desde el servidor, no desde el browser del usuario
# isDefault: true en Prometheus — se usa como datasource por defecto en nuevos paneles
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: monitoring
data:
  datasources.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus.monitoring.svc.cluster.local:9090
        isDefault: true
        editable: false
      - name: Loki
        type: loki
        access: proxy
        url: http://loki.monitoring.svc.cluster.local:3100
        editable: false

---
# Indica a Grafana dónde buscar ficheros JSON de dashboards para importar automáticamente
# disableDeletion: true — los dashboards provisionados no se pueden borrar desde la UI
# updateIntervalSeconds: 30 — Grafana recarga los dashboards del disco cada 30 segundos
# --- ConfigMap: provisioning de dashboards ---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: monitoring
data:
  dashboards.yml: |
    apiVersion: 1
    providers:
      - name: 'default'
        orgId: 1
        folder: 'Kubernetes'
        type: file
        disableDeletion: true
        updateIntervalSeconds: 30
        options:
          path: /var/lib/grafana/dashboards
          foldersFromFilesStructure: true

---
# Dashboard básico de Kubernetes con paneles de pods running, CPU y memoria por namespace
# Requiere métricas de kube-state-metrics (kube_pod_status_phase) y cAdvisor
# --- ConfigMap: Dashboard de Kubernetes ---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-kubernetes
  namespace: monitoring
data:
  kubernetes.json: |
    {
      "title": "Kubernetes Overview",
      "uid": "k8s-overview",
      "schemaVersion": 36,
      "panels": [
        {
          "title": "Pods Running por Namespace",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 0},
          "targets": [{
            "expr": "count(kube_pod_status_phase{phase='Running'}) by (namespace)",
            "legendFormat": "{{namespace}}"
          }]
        },
        {
          "title": "CPU Usage por Pod",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 4},
          "targets": [{
            "expr": "sum(rate(container_cpu_usage_seconds_total{container!=''}[5m])) by (pod, namespace)",
            "legendFormat": "{{namespace}}/{{pod}}"
          }]
        },
        {
          "title": "Memoria Usage por Pod",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 4},
          "targets": [{
            "expr": "sum(container_memory_working_set_bytes{container!=''}) by (pod, namespace)",
            "legendFormat": "{{namespace}}/{{pod}}"
          }]
        }
      ]
    }

