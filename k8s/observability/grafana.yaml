---
# --- Deployment de Grafana ---
# Monta todos los ConfigMaps de provisioning y el PVC de datos
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      securityContext:
        fsGroup: 472       # UID/GID del usuario grafana en la imagen oficial — acceso de escritura al PVC
        runAsUser: 472
        runAsNonRoot: true  # Cumple con PodSecurityStandard baseline
      containers:
        - name: grafana
          image: grafana/grafana:10.2.3   # Versión fija para reproducibilidad
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: grafana-secret
                  key: admin-user
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-secret
                  key: admin-password
            - name: GF_PATHS_PROVISIONING
              value: /etc/grafana/provisioning  # Indica a Grafana el directorio raíz de provisioning (datasources + dashboards)
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
          volumeMounts:
            - name: grafana-storage
              mountPath: /var/lib/grafana           # PVC: persiste SQLite, plugins instalados y sesiones
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources  # ConfigMap grafana-datasources: Prometheus + Loki
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards  # ConfigMap grafana-dashboard-provider: indica dónde leer los JSON
            - name: dashboard-kubernetes
              mountPath: /var/lib/grafana/dashboards/kubernetes.json
              subPath: kubernetes.json   # subPath: monta solo este fichero sin sobrescribir el directorio
            - name: dashboard-wordpress-k8s
              mountPath: /var/lib/grafana/dashboards/wordpress-k8s.json
              subPath: wordpress-k8s.json  # Dashboard completo del proyecto KubeNet
      volumes:
        - name: grafana-storage
          persistentVolumeClaim:
            claimName: grafana-pvc
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: dashboard-kubernetes
          configMap:
            name: grafana-dashboard-kubernetes
        - name: dashboard-wordpress-k8s
          configMap:
            name: grafana-dashboard-wordpress-k8s

---
# --- Service de Grafana (ClusterIP) ---
# Expuesto al exterior via Ingress (08-ingress.yaml) en grafana.monitoring.local
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: monitoring
spec:
  type: ClusterIP   # Solo acceso interno; el Ingress termina TLS y hace proxy hacia este Service
  ports:
    - port: 3000
      targetPort: 3000
  selector:
    app: grafana
