# ============================================================
# PROMETHEUS - Namespace: monitoring
# Sistema de recolección y almacenamiento de métricas time-series.
# Incluye también Alertmanager para el enrutamiento de alertas.
# ============================================================

# --- ConfigMap con la configuración principal de Prometheus ---
# Define los targets de scraping y la integración con Alertmanager
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s        # Frecuencia de recolección de métricas (cada 15 segundos)
      evaluation_interval: 15s    # Frecuencia de evaluación de reglas de alerta

    alerting:
      alertmanagers:
        - static_configs:
            # R-5: Alertmanager desplegado en el mismo namespace 'monitoring'
            - targets: ['alertmanager.monitoring.svc.cluster.local:9093']  # Dirección interna del Alertmanager

    rule_files:
      - "/etc/prometheus/rules/*.yml"   # Carga todos los archivos de reglas del volumen 'rules' (prometheus-rules ConfigMap)

    scrape_configs:
      # Métricas del propio Prometheus
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']  # Prometheus se auto-monitoriza en su propio puerto

      # Métricas de cAdvisor via kubelet (container_cpu, container_memory, etc.)
      # Estas son las métricas que usa el dashboard de Kubernetes
      - job_name: 'kubernetes-cadvisor'
        scheme: https              # Kubelet expone /metrics/cadvisor por HTTPS
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true  # Necesario en Minikube donde el cert del kubelet puede no coincidir con el CA del clúster
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token  # Token del ServiceAccount para autenticarse ante la API
        kubernetes_sd_configs:
          - role: node              # Service discovery dinámico: descubre todos los nodos del clúster
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)   # Propaga las labels del nodo como labels de la métrica
          - target_label: __address__
            replacement: kubernetes.default.svc:443    # Redirige el scraping a través de la API de Kubernetes (proxy)
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            target_label: __metrics_path__
            replacement: /api/v1/nodes/$1/proxy/metrics/cadvisor  # Ruta del endpoint cAdvisor por nodo

      # Métricas de los nodos via kubelet
      - job_name: 'kubernetes-nodes'
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            target_label: __metrics_path__
            replacement: /api/v1/nodes/$1/proxy/metrics  # Métricas generales del kubelet (no cAdvisor)

      # Métricas de todos los Pods via anotaciones
      # Un pod se hace "scrapeado" añadiendo la anotación: prometheus.io/scrape: "true"
      - job_name: 'kubernetes-pods'
        kubernetes_sd_configs:
          - role: pod               # Descubre todos los pods del clúster
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true             # Solo scrapea pods que tengan la anotación prometheus.io/scrape: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)             # Usa la ruta indicada en prometheus.io/path si existe (por defecto /metrics)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__   # Reemplaza el puerto por el indicado en prometheus.io/port
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)   # Propaga labels del pod a la métrica
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: kubernetes_namespace
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: kubernetes_pod_name

      # Métricas de kube-state-metrics (kube_pod_*, kube_node_*, etc.)
      # Requiere kube-state-metrics instalado en kube-system
      - job_name: 'kube-state-metrics'
        static_configs:
          - targets: ['kube-state-metrics.kube-system.svc.cluster.local:8080']  # Dirección fija de kube-state-metrics

---
# --- ConfigMap con reglas de alerta y SLOs ---
# Se monta en /etc/prometheus/rules/ y Prometheus lo recarga automáticamente
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-rules
  namespace: monitoring
data:
  alerts.yml: |
    groups:
      - name: kubernetes-alerts
        rules:
          # Alerta si un pod lleva más de 2 min sin estar en Running o Succeeded
          - alert: PodDown
            expr: kube_pod_status_phase{phase!~"Running|Succeeded"} == 1
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "Pod caído: {{ $labels.pod }}"
              description: "El Pod {{ $labels.pod }} en namespace {{ $labels.namespace }} lleva más de 2 minutos sin estar Running."

          # Alerta si un pod supera el 80% de su limit de CPU durante 5 minutos
          - alert: HighCPUUsage
            expr: |
              (sum(rate(container_cpu_usage_seconds_total{container!=""}[5m])) by (pod, namespace)
              / sum(kube_pod_container_resource_limits{resource="cpu"}) by (pod, namespace)) * 100 > 80
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "CPU alta en Pod: {{ $labels.pod }}"
              description: "El Pod {{ $labels.pod }} en {{ $labels.namespace }} supera el 80% de CPU durante más de 5 minutos."

          # Alerta si un pod supera el 80% de su limit de memoria durante 5 minutos
          - alert: HighMemoryUsage
            expr: |
              (sum(container_memory_working_set_bytes{container!=""}) by (pod, namespace)
              / sum(kube_pod_container_resource_limits{resource="memory"}) by (pod, namespace)) * 100 > 80
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Memoria alta en Pod: {{ $labels.pod }}"
              description: "El Pod {{ $labels.pod }} en {{ $labels.namespace }} supera el 80% de memoria durante más de 5 minutos."

          # Alerta específica para pods de MariaDB con umbral de 1 minuto (mayor criticidad)
          - alert: MariaDBPodDown
            expr: kube_pod_status_phase{namespace="databases",pod=~"mariadb-.*",phase!~"Running|Succeeded"} == 1
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Pod de MariaDB caído: {{ $labels.pod }}"
              description: "El pod {{ $labels.pod }} lleva más de 1 minuto fuera del estado Running."

          # Alerta inmediata al detectar una terminación por OOM (sin espera 'for')
          - alert: OOMKill
            expr: kube_pod_container_status_last_terminated_reason{reason="OOMKilled"} == 1
            for: 0m   # Se dispara al instante, sin espera, porque OOMKill es siempre relevante
            labels:
              severity: warning
            annotations:
              summary: "OOMKill en {{ $labels.pod }}"
              description: "El contenedor {{ $labels.container }} fue terminado por falta de memoria."

      # --------------------------------------------------------
      # SLOs y Error Budgets — Apartado 3.1
      # SLO: 99.9% de requests exitosas (error budget: 43min/mes)
      # --------------------------------------------------------
      - name: wordpress-slos
        rules:
          # Métrica de tasa de éxito en ventana de 5 minutos
          # Usada como base para calcular el burn rate del error budget
          - record: wordpress:request_success_rate:5m
            expr: |
              sum(rate(nginx_ingress_controller_requests{
                service="wordpress", status!~"5.."
              }[5m]))
              /
              sum(rate(nginx_ingress_controller_requests{
                service="wordpress"
              }[5m]))

          # Alerta de burn rate alto (x14.4 = consume error budget mensual en 1h)
          # Si se dispara, quedan ~43 minutos de error budget para todo el mes
          - alert: WordPressSLOBurnRateHigh
            expr: |
              (1 - wordpress:request_success_rate:5m) > (1 - 0.999) * 14.4
            for: 5m
            labels:
              severity: critical
              slo: availability
            annotations:
              summary: "WordPress consume error budget demasiado rápido"
              description: "Burn rate: {{ $value | humanizePercentage }}. Al ritmo actual el error budget mensual (43min) se agotará en menos de 1 hora."

          # Alerta de burn rate moderado (x3 = consume error budget en ~5 días)
          # Aviso temprano antes de que sea crítico
          - alert: WordPressSLOBurnRateMedium
            expr: |
              (1 - wordpress:request_success_rate:5m) > (1 - 0.999) * 3
            for: 30m
            labels:
              severity: warning
              slo: availability
            annotations:
              summary: "WordPress consumiendo error budget a ritmo elevado"
              description: "Burn rate: {{ $value | humanizePercentage }}. El error budget mensual se agotará en ~5 días si continúa."

          # Registro del error budget restante (útil para dashboards Grafana)
          - record: wordpress:error_budget_remaining:30d
            expr: |
              1 - (
                sum(increase(nginx_ingress_controller_requests{
                  service="wordpress", status=~"5.."
                }[30d]))
                /
                sum(increase(nginx_ingress_controller_requests{
                  service="wordpress"
                }[30d]))
              ) / (1 - 0.999)

---
# --- PVC para almacenamiento de series temporales de Prometheus ---
# Retención configurada en 15 días (--storage.tsdb.retention.time=15d)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-pvc
  namespace: monitoring
spec:
  accessModes:
    - ReadWriteOnce          # Un único nodo monta el volumen en escritura (Deployment de 1 réplica)
  resources:
    requests:
      storage: 10Gi          # Suficiente para 15 días de métricas con 4 namespaces activos
  storageClassName: standard # StorageClass por defecto de Minikube (hostPath)

---
# --- ServiceAccount para Prometheus ---
# Necesario para asociar el ClusterRoleBinding que permite leer recursos de la API
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: monitoring

---
# --- ClusterRole: permisos de lectura sobre recursos de Kubernetes ---
# Prometheus necesita descubrir pods, endpoints y nodos para el service discovery
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus
rules:
  - apiGroups: [""]
    resources: ["nodes", "nodes/proxy", "nodes/metrics", "services", "endpoints", "pods", "namespaces"]
    verbs: ["get", "list", "watch"]   # Solo lectura — sin capacidad de modificar recursos
  - apiGroups: ["extensions", "networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]   # Permite descubrir Ingress para scraping de métricas del controlador NGINX
  - nonResourceURLs: ["/metrics", "/metrics/cadvisor"]
    verbs: ["get"]                    # Acceso directo a los endpoints /metrics de kubelet y cAdvisor

---
# --- ClusterRoleBinding: vincula el ClusterRole con el ServiceAccount ---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: monitoring

---
# --- Deployment de Prometheus ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: monitoring
  labels:
    app: prometheus
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/version: "2.48.0"
    app.kubernetes.io/part-of: wordpress-ha
    app.kubernetes.io/component: monitoring
spec:
  replicas: 1   # Una sola réplica: Prometheus no soporta HA nativa sin Thanos/Cortex
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      serviceAccountName: prometheus   # Usa el ServiceAccount con permisos RBAC para service discovery
      securityContext:
        fsGroup: 65534     # Grupo 'nobody' — permite al proceso de Prometheus escribir en el PVC
        runAsUser: 65534   # Usuario 'nobody' — ejecuta sin privilegios de root
        runAsNonRoot: true # Política de seguridad: rechaza si el proceso intenta ejecutar como root
      containers:
        - name: prometheus
          image: prom/prometheus:v2.48.0   # Versión fija para reproducibilidad
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"      # Ruta del ConfigMap montado como volumen
            - "--storage.tsdb.path=/prometheus"                   # Directorio del PVC donde se almacenan las series
            - "--storage.tsdb.retention.time=15d"                 # Retención de 15 días; ajustar según tamaño del PVC
            - "--web.enable-lifecycle"                            # Permite recargar config via POST /-/reload sin reiniciar
          ports:
            - containerPort: 9090   # Puerto de la API y UI de Prometheus
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus              # Monta prometheus.yml desde prometheus-config ConfigMap
            - name: rules
              mountPath: /etc/prometheus/rules        # Monta alerts.yml desde prometheus-rules ConfigMap
            - name: prometheus-storage
              mountPath: /prometheus                  # Monta el PVC para persistencia de datos TSDB
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9090
            initialDelaySeconds: 30
            periodSeconds: 15
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: rules
          configMap:
            name: prometheus-rules
        - name: prometheus-storage
          persistentVolumeClaim:
            claimName: prometheus-pvc

---
# --- Service de Prometheus (ClusterIP) ---
# Accesible desde Grafana internamente y expuesto al exterior via Ingress (08-ingress.yaml)
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: monitoring
spec:
  type: ClusterIP
  ports:
    - port: 9090
      targetPort: 9090
  selector:
    app: prometheus

---
# ============================================================
# R-5: ALERTMANAGER - Canal de notificación para alertas de Prometheus
# Configurado con receptor de email (ajustar SMTP en producción)
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: monitoring
  labels:
    app.kubernetes.io/name: alertmanager
    app.kubernetes.io/part-of: wordpress-ha
    app.kubernetes.io/component: monitoring
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m   # Tiempo tras el que se considera resuelta una alerta sin datos
      # Ajustar en producción con SMTP real o receptor Slack/PagerDuty
      # smtp_smarthost: 'smtp.example.com:587'
      # smtp_from: 'alertmanager@example.com'

    route:
      group_by: ['alertname', 'namespace']  # Agrupa alertas del mismo tipo y namespace en una sola notificación
      group_wait: 30s          # Espera 30s antes de enviar el primer grupo (acumula alertas relacionadas)
      group_interval: 5m       # Intervalo entre actualizaciones de grupos ya notificados
      repeat_interval: 12h     # Reenvía la notificación cada 12h si la alerta sigue activa
      receiver: 'default-receiver'
      routes:
        - match:
            severity: critical  # Enruta alertas críticas al receptor dedicado (no continúa al siguiente route)
          receiver: 'critical-receiver'
          continue: false
        - match:
            severity: warning
          receiver: 'warning-receiver'
          continue: false

    receivers:
      - name: 'default-receiver'   # Receptor vacío para alertas no enrutadas (sin-ops silencioso)

      - name: 'critical-receiver'
        slack_configs:
          - api_url: 'CHANGE_ME_SLACK_WEBHOOK_URL'  # Cambiar por tu Incoming Webhook de Slack
            channel: '#alertas-k8s'
            icon_emoji: ':fire:'
            send_resolved: true    # Notifica también cuando la alerta se resuelve
            title: '[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}'
            text: |
              {{ range .Alerts }}
              *Severidad:* {{ .Labels.severity }}
              *Namespace:* {{ .Labels.namespace }}
              *Pod:* {{ .Labels.pod }}
              *Descripción:* {{ .Annotations.description }}
              {{ end }}

      - name: 'warning-receiver'
        slack_configs:
          - api_url: 'CHANGE_ME_SLACK_WEBHOOK_URL'  # Cambiar por tu Incoming Webhook de Slack
            channel: '#alertas-k8s'
            icon_emoji: ':warning:'
            send_resolved: true
            title: '[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}'
            text: |
              {{ range .Alerts }}
              *Severidad:* {{ .Labels.severity }}
              *Namespace:* {{ .Labels.namespace }}
              *Pod:* {{ .Labels.pod }}
              *Descripción:* {{ .Annotations.description }}
              {{ end }}

    inhibit_rules:
      # Si hay una alerta crítica sobre un pod, suprime las warnings del mismo pod
      # Evita notificar por HighCPU si el pod ya está caído (PodDown)
      - source_match:
          severity: 'critical'
        target_match:
          severity: 'warning'
        equal: ['alertname', 'namespace']

---
# --- Deployment de Alertmanager ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: monitoring
  labels:
    app: alertmanager
    app.kubernetes.io/name: alertmanager
    app.kubernetes.io/part-of: wordpress-ha
    app.kubernetes.io/component: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager
  template:
    metadata:
      labels:
        app: alertmanager
        app.kubernetes.io/name: alertmanager
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
      containers:
        - name: alertmanager
          image: prom/alertmanager:v0.26.0
          args:
            - "--config.file=/etc/alertmanager/alertmanager.yml"  # Config desde ConfigMap
            - "--storage.path=/alertmanager"                      # Almacenamiento en memoria (emptyDir)
            - "--web.listen-address=:9093"                        # Puerto de escucha — referenciado en prometheus.yml
          ports:
            - containerPort: 9093
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9093
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9093
            initialDelaySeconds: 20
            periodSeconds: 15
          volumeMounts:
            - name: config
              mountPath: /etc/alertmanager
            - name: storage
              mountPath: /alertmanager   # emptyDir: el estado de silenciamientos se pierde en reinicios
      volumes:
        - name: config
          configMap:
            name: alertmanager-config
        - name: storage
          emptyDir: {}   # Sin persistencia: suficiente para entorno de prácticas

---
# --- Service de Alertmanager (ClusterIP) ---
# Solo necesita ser accesible desde Prometheus en el mismo namespace
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: monitoring
  labels:
    app: alertmanager
    app.kubernetes.io/name: alertmanager
    app.kubernetes.io/part-of: wordpress-ha
spec:
  type: ClusterIP
  ports:
    - port: 9093
      targetPort: 9093
      name: http
  selector:
    app: alertmanager
