# ============================================================
# 19-velero.yaml — Backup completo del clúster con Velero
#
# ESTRATEGIA:
#   - Backend: MinIO local (bucket: velero-backups)
#   - Schedule: diario a la 1:00 AM (Europe/Madrid)
#   - Namespaces: wordpress + databases
#   - Retención: 30 días (720h)
#   - Incluye: objetos K8s + snapshots de PVCs (CSI)
#
# PRE-REQUISITOS (activados por deploy.sh automáticamente):
#   minikube addons enable volumesnapshots
#   minikube addons enable csi-hostpath-driver
#
# RESTAURACIÓN COMPLETA:
#   velero restore create --from-backup wordpress-daily-<FECHA>
#
# RESTAURACIÓN EN NAMESPACE SEPARADO (para pruebas):
#   velero restore create --from-backup wordpress-daily-<FECHA> \
#     --namespace-mappings wordpress:wordpress-restore
#
# VER BACKUPS DISPONIBLES:
#   velero backup get
#   velero schedule get
# ============================================================

# ------------------------------------------------------------
# Job: Crear bucket velero-backups en MinIO antes de instalar Velero
# ------------------------------------------------------------
apiVersion: batch/v1
kind: Job
metadata:
  name: velero-bucket-setup
  namespace: storage
  labels:
    app: velero-setup
    app.kubernetes.io/part-of: wordpress-ha
    app.kubernetes.io/component: backup
spec:
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app: velero-setup
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: minio/mc:latest
          imagePullPolicy: Never
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "=== Creando bucket velero-backups en MinIO ==="

              mc alias set local \
                http://minio.storage.svc.cluster.local:9000 \
                "${MINIO_ROOT_USER}" "${MINIO_ROOT_PASSWORD}"

              # Crear bucket si no existe
              mc mb local/velero-backups --ignore-existing
              echo "✅ Bucket velero-backups listo"

              # Listar buckets para confirmar
              mc ls local/
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: access-key
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: secret-key
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi

---
# ------------------------------------------------------------
# NetworkPolicy: Velero puede acceder a MinIO y a la API de K8s
# ------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-velero-egress
  namespace: velero
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: velero
  policyTypes:
    - Egress
  egress:
    # MinIO
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: storage
      ports:
        - port: 9000
    # API de Kubernetes (para listar/restaurar recursos)
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - port: 6443
        - port: 443
    # DNS
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
