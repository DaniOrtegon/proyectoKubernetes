# ============================================================
# Deployment para MariaDB en el namespace 'databases'
# Crea una instancia de MariaDB para que sea usada por WordPress.
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mariadb
  namespace: databases       # Mismo namespace que el Secret y el PVC
  labels:
    app: mariadb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mariadb
  template:
    metadata:
      labels:
        app: mariadb
    spec:
      containers:
        - name: mariadb
          image: mariadb:10.6  # Versión fija recomendada, evitar 'latest' en producción
          ports:
            - containerPort: 3306  # Puerto estándar de MariaDB
          env:
            # Variables tomadas del Secret 'mariadb-secret' (datos sensibles)
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mariadb-secret
                  key: mariadb-root-password
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mariadb-secret
                  key: mariadb-user-password
            # Variables tomadas del ConfigMap 'mariadb-config' (datos no sensibles)
            - name: MYSQL_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: mariadb-config
                  key: MYSQL_DATABASE
            - name: MYSQL_USER
              valueFrom:
                configMapKeyRef:
                  name: mariadb-config
                  key: MYSQL_USER
          resources:
            requests:
              cpu: 100m        # Mínimo de CPU garantizado
              memory: 256Mi    # Mínimo de memoria garantizada
            limits:
              cpu: 500m        # Máximo de CPU permitido
              memory: 512Mi    # Máximo de memoria permitida
          volumeMounts:
            - name: mariadb-storage
              mountPath: /var/lib/mysql  # Ruta interna donde MariaDB guarda los datos
      volumes:
        - name: mariadb-storage
          persistentVolumeClaim:
            claimName: mariadb-pvc  # PVC definido en 03-pvc.yaml

---
# ============================================================
# Servicio para MariaDB en el namespace 'databases'
# Expone MariaDB internamente para que WordPress pueda conectarse.
# WordPress lo alcanza via FQDN: mariadb.databases.svc.cluster.local
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: mariadb
  namespace: databases
spec:
  ports:
    - port: 3306        # Puerto que expone el Service
      targetPort: 3306  # Puerto del contenedor al que redirige el tráfico
  selector:
    app: mariadb        # Envía el tráfico a los Pods con esta etiqueta
  # clusterIP: None eliminado — usamos ClusterIP normal para mayor compatibilidad
  # WordPress se conecta via FQDN: mariadb.databases.svc.cluster.local
