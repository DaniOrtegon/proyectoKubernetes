# ============================================================
# 04-mariadb.yaml — MariaDB HA con replicación Master-Replica
#
# ARQUITECTURA:
#   - mariadb-0: PRIMARY (escrituras + lecturas)
#   - mariadb-1: REPLICA (solo lectura, replicación asíncrona)
#   - Un solo contenedor por pod — sin sidecars
#   - El script de entrypoint gestiona todo según el ordinal
# ============================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: mariadb-config
  namespace: databases
  labels:
    app: mariadb
    app.kubernetes.io/name: mariadb
    app.kubernetes.io/part-of: wordpress-ha
data:
  MYSQL_DATABASE: wordpress_db
  MYSQL_USER: wordpress_user

  # Script que decide el rol según el ordinal del StatefulSet
  # La replicación se configura por separado via Job (04b-mariadb-replication-job.yaml)
  start-mariadb.sh: |
    #!/bin/bash
    ORDINAL=$(echo $HOSTNAME | rev | cut -d'-' -f1 | rev)
    if [ "$ORDINAL" = "0" ]; then
      echo "=== Arrancando como PRIMARY (server-id=1) ==="
      exec docker-entrypoint.sh mysqld \
        --server-id=1 \
        --log-bin=mysql-bin \
        --binlog-format=ROW \
        --binlog-do-db=wordpress_db \
        --sync-binlog=1 \
        --character-set-server=utf8mb4 \
        --collation-server=utf8mb4_unicode_ci \
        --max-connections=200
    else
      echo "=== Arrancando como REPLICA (server-id=2) ==="
      exec docker-entrypoint.sh mysqld \
        --server-id=2 \
        --relay-log=relay-bin \
        --read-only=1 \
        --character-set-server=utf8mb4 \
        --collation-server=utf8mb4_unicode_ci \
        --max-connections=200
    fi

---
apiVersion: v1
kind: Service
metadata:
  name: mariadb-headless
  namespace: databases
  labels:
    app: mariadb
    app.kubernetes.io/name: mariadb
    app.kubernetes.io/part-of: wordpress-ha
spec:
  clusterIP: None
  ports:
    - port: 3306
      targetPort: 3306
  selector:
    app: mariadb

---
# Service 'mariadb' — apunta siempre al primary (mariadb-0)
# WordPress usa este service como WORDPRESS_DB_HOST
apiVersion: v1
kind: Service
metadata:
  name: mariadb
  namespace: databases
  labels:
    app: mariadb
    app.kubernetes.io/name: mariadb
    app.kubernetes.io/part-of: wordpress-ha
spec:
  type: ClusterIP
  ports:
    - port: 3306
      targetPort: 3306
  selector:
    app: mariadb
    statefulset.kubernetes.io/pod-name: mariadb-0

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mariadb
  namespace: databases
  labels:
    app: mariadb
    app.kubernetes.io/name: mariadb
    app.kubernetes.io/version: "10.6"
    app.kubernetes.io/part-of: wordpress-ha
    app.kubernetes.io/component: database
spec:
  serviceName: mariadb-headless
  replicas: 2
  selector:
    matchLabels:
      app: mariadb
  template:
    metadata:
      labels:
        app: mariadb
        app.kubernetes.io/name: mariadb
        app.kubernetes.io/part-of: wordpress-ha
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: mariadb
                topologyKey: kubernetes.io/hostname
      initContainers:
        - name: fix-perms
          image: mariadb:10.6
          command: ["chown", "-R", "999:999", "/var/lib/mysql"]
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: mariadb-storage
              mountPath: /var/lib/mysql

        - name: init-scripts
          image: busybox
          imagePullPolicy: Never
          command:
            - sh
            - -c
            - cp /config/start-mariadb.sh /scripts/start-mariadb.sh && chmod +x /scripts/start-mariadb.sh
          volumeMounts:
            - name: mariadb-config-vol
              mountPath: /config
            - name: scripts
              mountPath: /scripts

      containers:
        - name: mariadb
          image: mariadb:10.6
          command: ["/scripts/start-mariadb.sh"]
          securityContext:
            runAsUser: 999
            runAsNonRoot: true
            allowPrivilegeEscalation: false
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mariadb-secret
                  key: mariadb-root-password
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mariadb-secret
                  key: mariadb-user-password
            - name: MYSQL_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: mariadb-config
                  key: MYSQL_DATABASE
            - name: MYSQL_USER
              valueFrom:
                configMapKeyRef:
                  name: mariadb-config
                  key: MYSQL_USER
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - mysqladmin -u root -p"${MYSQL_ROOT_PASSWORD}" ping -h localhost
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - mysqladmin -u root -p"${MYSQL_ROOT_PASSWORD}" ping -h localhost
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 5
          volumeMounts:
            - name: mariadb-storage
              mountPath: /var/lib/mysql
            - name: scripts
              mountPath: /scripts

      volumes:
        - name: mariadb-config-vol
          configMap:
            name: mariadb-config
            items:
              - key: start-mariadb.sh
                path: start-mariadb.sh
        - name: scripts
          emptyDir: {}

  volumeClaimTemplates:
    - metadata:
        name: mariadb-storage
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: standard
        resources:
          requests:
            storage: 5Gi
