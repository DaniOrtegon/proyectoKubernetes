# ============================================================
# StatefulSet para MariaDB en el namespace 'databases'
# ============================================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mariadb
  namespace: databases
  labels:
    app: mariadb
    app.kubernetes.io/name: mariadb
    app.kubernetes.io/version: "10.6"
    app.kubernetes.io/part-of: wordpress-ha
    app.kubernetes.io/component: database
spec:
  serviceName: mariadb
  replicas: 1
  selector:
    matchLabels:
      app: mariadb
  template:
    metadata:
      labels:
        app: mariadb
        app.kubernetes.io/name: mariadb
        app.kubernetes.io/version: "10.6"
        app.kubernetes.io/part-of: wordpress-ha
    spec:
      # R-SEC-1: initContainer que ajusta permisos del volumen antes de que
      # MariaDB arranque. Necesario porque el PVC puede crearse con uid 0 (root)
      # y MariaDB no puede escribir en /var/lib/mysql si no es su propietario.
      # Solo este init necesita root; el contenedor principal corre como uid 999.
      initContainers:
        - name: fix-perms
          image: mariadb:10.6
          command: ["chown", "-R", "999:999", "/var/lib/mysql"]
          securityContext:
            runAsUser: 0              # root solo para el chown inicial
            allowPrivilegeEscalation: false
          volumeMounts:
            - name: mariadb-storage
              mountPath: /var/lib/mysql
      containers:
        - name: mariadb
          image: mariadb:10.6
          # R-SEC-1: SecurityContext a nivel de contenedor.
          # uid 999 = mysql en la imagen oficial de MariaDB.
          # allowPrivilegeEscalation: false impide escalar privilegios dentro del proceso.
          # capabilities drop ALL elimina todos los privilegios de kernel innecesarios.
          # NOTA: readOnlyRootFilesystem no se aplica aquí porque MariaDB necesita
          # escribir en /run/mysqld (socket) y /tmp. En producción se puede añadir
          # montando emptyDir en esas rutas, pero aumenta la complejidad del pod.
          securityContext:
            runAsUser: 999
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mariadb-secret
                  key: mariadb-root-password
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mariadb-secret
                  key: mariadb-user-password
            - name: MYSQL_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: mariadb-config
                  key: MYSQL_DATABASE
            - name: MYSQL_USER
              valueFrom:
                configMapKeyRef:
                  name: mariadb-config
                  key: MYSQL_USER
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            exec:
              command: ["mysqladmin", "ping", "-h", "localhost"]
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["mysqladmin", "ping", "-h", "localhost"]
            initialDelaySeconds: 40
            periodSeconds: 20
          volumeMounts:
            - name: mariadb-storage
              mountPath: /var/lib/mysql
  volumeClaimTemplates:
    - metadata:
        name: mariadb-storage
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: standard
        resources:
          requests:
            storage: 1Gi

---
# ============================================================
# Headless Service para MariaDB
# StatefulSet requiere clusterIP: None para identidades de red estables.
# WordPress sigue conectándose via: mariadb.databases.svc.cluster.local
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: mariadb
  namespace: databases
  labels:
    app: mariadb
    app.kubernetes.io/name: mariadb
    app.kubernetes.io/part-of: wordpress-ha
    app.kubernetes.io/component: database
spec:
  clusterIP: None
  ports:
    - port: 3306
      targetPort: 3306
  selector:
    app: mariadb
