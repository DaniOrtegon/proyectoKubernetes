# ============================================================
# PersistentVolumeClaim (PVC) para el namespace 'wordpress'
# Se usa para almacenar datos persistentes de WordPress (uploads, temas, plugins)
# ============================================================
# NOTA: MariaDB NO necesita PVC aquí. El StatefulSet en 04-mariadb.yaml gestiona
# su propio volumen automáticamente via volumeClaimTemplates (genera
# 'mariadb-storage-mariadb-0'). Definir mariadb-pvc aquí sería un PVC huérfano
# que consumiría cuota sin ser usado por ningún Pod.
# ============================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: wordpress-pvc        # Nombre del PVC, utilizado por el Deployment de WordPress
  namespace: wordpress       # Mismo namespace que el Deployment de WordPress
spec:
  accessModes:
    # R-8: ReadWriteOnce solo permite montar el volumen en UN único nodo.
    # Con HPA (minReplicas:2) en clúster MULTI-NODO esto impide que réplicas
    # en nodos distintos compartan el mismo PVC → pods quedarán en Pending.
    # SOLUCIÓN para producción multi-nodo:
    #   - Cambiar a ReadWriteMany con una StorageClass que lo soporte (NFS, CephFS, EFS…)
    #   - O usar un Object Storage externo (S3 + plugin wp-offload-media) para uploads.
    # En Minikube (1 nodo) ReadWriteOnce funciona con múltiples réplicas en el mismo nodo.
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi           # Más espacio que MariaDB, WordPress almacena media y plugins
  storageClassName: standard  # Clase de almacenamiento por defecto
  volumeMode: Filesystem      # Modo de volumen de sistema de archivos
