apiVersion: v1
kind: Namespace
metadata:
  name: wordpress  # Namespace para los recursos de WordPress (Deployment, Service, PVCs, etc.)

---
apiVersion: v1
kind: Namespace
metadata:
  name: databases  # Namespace para bases de datos (MariaDB, Redis)

---
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring  # Namespace para herramientas de monitoreo (Prometheus, Grafana, Loki)

---
# R-2: Namespace 'security' añadido — referenciado en Promtail (11-loki.yaml)
# y en el dashboard de Grafana (wordpress-k8s.json) como namespace del stack.
apiVersion: v1
kind: Namespace
metadata:
  name: security  # Namespace para componentes de seguridad (WAF, cert-manager, etc.)

---
apiVersion: v1
kind: Namespace
metadata:
  name: cert-manager  # Namespace para cert-manager (TLS end-to-end)

---
apiVersion: v1
kind: Namespace
metadata:
  name: storage
  labels:
    app.kubernetes.io/part-of: wordpress-ha
