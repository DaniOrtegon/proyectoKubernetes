# ============================================================
# GRAFANA - Namespace: monitoring
# Visualización de métricas (Prometheus) y logs (Loki)
# ============================================================

# --- PersistentVolumeClaim para Grafana ---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-pvc
  namespace: monitoring
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: standard

---
# --- Secret con credenciales de Grafana ---
apiVersion: v1
kind: Secret
metadata:
  name: grafana-secret
  namespace: monitoring
type: Opaque
data:
  admin-user: YWRtaW4=         # 'admin' en base64
  admin-password: YWRtaW4xMjM= # 'admin123' en base64 — CAMBIAR en producción

---
# --- ConfigMap: provisioning de datasources (Prometheus + Loki) ---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: monitoring
data:
  datasources.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus.monitoring.svc.cluster.local:9090
        isDefault: true         # Fuente de datos por defecto
        editable: false

      - name: Loki
        type: loki
        access: proxy
        url: http://loki.monitoring.svc.cluster.local:3100
        editable: false

---
# --- ConfigMap: provisioning de dashboards preconfigurados ---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: monitoring
data:
  dashboards.yml: |
    apiVersion: 1
    providers:
      - name: 'default'
        orgId: 1
        folder: 'Kubernetes'
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        options:
          path: /var/lib/grafana/dashboards

---
# --- ConfigMap: Dashboard de Kubernetes (resumen de pods y namespaces) ---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-kubernetes
  namespace: monitoring
data:
  kubernetes.json: |
    {
      "title": "Kubernetes Overview",
      "uid": "k8s-overview",
      "schemaVersion": 36,
      "panels": [
        {
          "title": "Pods Running por Namespace",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 0},
          "targets": [{
            "expr": "count(kube_pod_status_phase{phase='Running'}) by (namespace)",
            "legendFormat": "{{namespace}}"
          }]
        },
        {
          "title": "CPU Usage por Pod",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 4},
          "targets": [{
            "expr": "sum(rate(container_cpu_usage_seconds_total{container!=''}[5m])) by (pod, namespace)",
            "legendFormat": "{{namespace}}/{{pod}}"
          }]
        },
        {
          "title": "Memoria Usage por Pod",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 4},
          "targets": [{
            "expr": "sum(container_memory_working_set_bytes{container!=''}) by (pod, namespace)",
            "legendFormat": "{{namespace}}/{{pod}}"
          }]
        }
      ]
    }

---
# --- Deployment de Grafana ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      securityContext:
        fsGroup: 472             # GID requerido por Grafana para acceder al volumen
        runAsUser: 472
        runAsNonRoot: true
      containers:
        - name: grafana
          image: grafana/grafana:10.2.3    # Versión fija estable
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: grafana-secret
                  key: admin-user
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-secret
                  key: admin-password
            - name: GF_SERVER_ROOT_URL
              value: "http://grafana.monitoring.local"   # URL del Ingress
            - name: GF_ANALYTICS_REPORTING_ENABLED
              value: "false"          # Deshabilita telemetría hacia Grafana Inc.
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"          # Solo el admin puede crear usuarios
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: grafana-storage
              mountPath: /var/lib/grafana
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboard-kubernetes
              mountPath: /var/lib/grafana/dashboards
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
      volumes:
        - name: grafana-storage
          persistentVolumeClaim:
            claimName: grafana-pvc
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: dashboard-kubernetes
          configMap:
            name: grafana-dashboard-kubernetes

---
# --- Service de Grafana (NodePort como fallback + Ingress como acceso principal) ---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: monitoring
spec:
  type: NodePort
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30030    # Acceso directo: http://<IP-nodo>:30030
  selector:
    app: grafana

---
# --- Ingress para Prometheus y Grafana bajo monitoring.local ---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: monitoring-ingress
  namespace: monitoring
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-body-size: "32m"
spec:
  ingressClassName: nginx
  rules:
    # Grafana: http://grafana.monitoring.local
    - host: grafana.monitoring.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 3000
    # Prometheus: http://prometheus.monitoring.local
    - host: prometheus.monitoring.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: prometheus
                port:
                  number: 9090
