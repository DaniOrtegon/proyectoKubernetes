# ============================================================
# LimitRange para namespace 'wordpress'
# Define valores por defecto para pods que no declaren resources.
# Evita que un pod sin limits consuma recursos ilimitados.
# ============================================================
apiVersion: v1
kind: LimitRange
metadata:
  name: wordpress-limitrange
  namespace: wordpress
spec:
  limits:
    - type: Container
      default:
        cpu: 500m
        memory: 256Mi
      defaultRequest:
        cpu: 100m
        memory: 128Mi
      max:
        cpu: "1"
        memory: 1Gi

---
# ============================================================
# ResourceQuota para namespace 'wordpress'
# Techo total de recursos que puede consumir el namespace.
# Con HPA maxReplicas: 5 y limits 500m/512Mi por pod:
#   CPU máx:    5 * 500m  = 2500m  → techo en 3
#   Mem máx:    5 * 512Mi = 2560Mi → techo en 3Gi
# ============================================================
apiVersion: v1
kind: ResourceQuota
metadata:
  name: wordpress-quota
  namespace: wordpress
spec:
  hard:
    requests.cpu: "1"
    requests.memory: 1Gi
    limits.cpu: "3"
    limits.memory: 3Gi
    pods: "10"
    persistentvolumeclaims: "5"

---
# ============================================================
# LimitRange para namespace 'databases'
# ============================================================
apiVersion: v1
kind: LimitRange
metadata:
  name: databases-limitrange
  namespace: databases
spec:
  limits:
    - type: Container
      default:
        cpu: 500m
        memory: 512Mi
      defaultRequest:
        cpu: 100m
        memory: 128Mi
      max:
        cpu: "1"
        memory: 1Gi

---
# ============================================================
# ResourceQuota para namespace 'databases'
# MariaDB + Redis: ambos con replicas: 1
# ============================================================
apiVersion: v1
kind: ResourceQuota
metadata:
  name: databases-quota
  namespace: databases
spec:
  hard:
    requests.cpu: "500m"
    requests.memory: 512Mi
    limits.cpu: "2"
    limits.memory: 2Gi
    pods: "5"
    persistentvolumeclaims: "3"
