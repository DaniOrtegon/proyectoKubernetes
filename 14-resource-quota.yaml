# ============================================================
# LimitRange para namespace 'wordpress'
# Define valores por defecto para pods que no declaren resources.
# Evita que un pod sin limits consuma recursos ilimitados.
# ============================================================
apiVersion: v1
kind: LimitRange
metadata:
  name: wordpress-limitrange
  namespace: wordpress
spec:
  limits:
    - type: Container
      default:
        cpu: 500m
        memory: 256Mi
      defaultRequest:
        cpu: 100m
        memory: 128Mi
      max:
        cpu: "1"
        memory: 1Gi

---
# ============================================================
# ResourceQuota para namespace 'wordpress'
# Techo total de recursos que puede consumir el namespace.
# Con HPA maxReplicas: 5 y resources por pod:
#   requests.cpu:    5 * 100m  =  500m  → techo en 1 (1000m)
#   requests.memory: 5 * 256Mi = 1280Mi → techo en 2Gi  ← CORREGIDO (antes 1Gi bloqueaba el 5º pod)
#   limits.cpu:      5 * 500m  = 2500m  → techo en 3
#   limits.memory:   5 * 512Mi = 2560Mi → techo en 3Gi
# ============================================================
apiVersion: v1
kind: ResourceQuota
metadata:
  name: wordpress-quota
  namespace: wordpress
spec:
  hard:
    requests.cpu: "1"
    requests.memory: 2Gi
    limits.cpu: "3"
    limits.memory: 3Gi
    pods: "10"
    persistentvolumeclaims: "5"

---
# ============================================================
# LimitRange para namespace 'databases'
# ============================================================
apiVersion: v1
kind: LimitRange
metadata:
  name: databases-limitrange
  namespace: databases
spec:
  limits:
    - type: Container
      default:
        cpu: 500m
        memory: 512Mi
      defaultRequest:
        cpu: 100m
        memory: 128Mi
      max:
        cpu: "1"
        memory: 1Gi

---
# ============================================================
# ResourceQuota para namespace 'databases'
# MariaDB + Redis: ambos con replicas: 1
# ============================================================
apiVersion: v1
kind: ResourceQuota
metadata:
  name: databases-quota
  namespace: databases
spec:
  hard:
    # Redis HA: 3 pods × (128Mi redis + 32Mi sentinel) = 480Mi requests
    # MariaDB: 256Mi requests → total ~740Mi → techo en 1Gi
    requests.cpu: "1"
    requests.memory: 1Gi
    # Limits: 3 × (256Mi + 64Mi) + 512Mi (mariadb) = ~1.5Gi → techo en 3Gi
    limits.cpu: "3"
    limits.memory: 3Gi
    # 3 pods redis + 1 mariadb = 4 pods mínimo
    pods: "10"
    # 3 PVCs redis (volumeClaimTemplates) + 1 mariadb = 4 PVCs
    persistentvolumeclaims: "6"
