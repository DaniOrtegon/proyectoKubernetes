# ============================================================
# Ingress para exponer WordPress en el namespace 'wordpress'
# Requiere un Ingress Controller instalado en el clúster.
# En Minikube: minikube addons enable ingress
# ============================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wordpress-ingress
  namespace: wordpress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-body-size: "64m"  # Permite subir archivos de hasta 64MB en WordPress
spec:
  ingressClassName: nginx  # Especifica explícitamente el controlador a usar (recomendado desde K8s 1.18+)
  rules:
    - host: wp-k8s.local   # Añade '127.0.0.1 wp-k8s.local' en tu /etc/hosts para resolución local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: wordpress
                port:
                  number: 80
