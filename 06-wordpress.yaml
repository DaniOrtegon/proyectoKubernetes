# ============================================================
# Deployment para WordPress en el namespace 'wordpress'
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wordpress
  namespace: wordpress
  labels:
    app: wordpress
    app.kubernetes.io/name: wordpress
    app.kubernetes.io/version: "6.4"
    app.kubernetes.io/part-of: wordpress-ha
    app.kubernetes.io/component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wordpress
  template:
    metadata:
      labels:
        app: wordpress
        app.kubernetes.io/name: wordpress
        app.kubernetes.io/version: "6.4"
        app.kubernetes.io/part-of: wordpress-ha
    spec:
      affinity:
        podAntiAffinity:
          # ENTORNO: preferredDuringSchedulingIgnoredDuringExecution es la opción correcta
          # para Minikube (1 nodo). Con 'required' el HPA no puede programar el 2º pod
          # porque no hay un segundo nodo con topologyKey kubernetes.io/hostname distinto,
          # dejando permanentemente 1 pod en Pending y rompiendo la HA.
          #
          # En producción multi-nodo: cambiar a requiredDuringSchedulingIgnoredDuringExecution
          # para garantizar separación estricta entre réplicas.
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - wordpress
                topologyKey: kubernetes.io/hostname
      # R-SEC-1: SecurityContext a nivel de Pod.
      # runAsUser 33 = www-data en Debian (usuario del servidor web).
      # fsGroup 33 garantiza que el volumen montado sea legible por www-data.
      # seccompProfile RuntimeDefault filtra syscalls peligrosas sin coste operacional.
      securityContext:
        runAsNonRoot: true
        runAsUser: 33
        fsGroup: 33
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: wordpress
          image: wordpress:6.4  # Versión estable actual, evitamos 5.7 (desactualizada) y latest
          ports:
            - containerPort: 80
          # R-SEC-1: SecurityContext a nivel de contenedor.
          # readOnlyRootFilesystem impide que un atacante escriba en el FS del contenedor.
          # allowPrivilegeEscalation: false bloquea sudo/setuid dentro del proceso.
          # capabilities drop ALL elimina todos los privilegios de kernel innecesarios.
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          env:
            - name: WORDPRESS_DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: wordpress-config
                  key: WORDPRESS_DB_HOST

            # Datos no sensibles desde el ConfigMap 'wordpress-config'
            - name: WORDPRESS_DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: wordpress-config
                  key: WORDPRESS_DB_NAME
            - name: WORDPRESS_DB_USER
              valueFrom:
                configMapKeyRef:
                  name: wordpress-config
                  key: WORDPRESS_DB_USER

            # Contraseña desde el Secret 'mariadb-secret'
            # IMPORTANTE: Este Secret está en namespace 'databases'.
            # Para que WordPress pueda usarlo, debes crear una copia del Secret
            # en el namespace 'wordpress' o usar External Secrets Operator.
            # Por simplicidad en prácticas, duplicamos el Secret en 01-secrets.yaml.
            - name: WORDPRESS_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mariadb-secret
                  key: mariadb-user-password

            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: redis-password
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: access-key
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: secret-key

            # Configuración extra de WordPress via PHP
            - name: WORDPRESS_CONFIG_EXTRA
              value: |
                define('WP_HOME', 'http://wp-k8s.local');
                define('WP_SITEURL', 'http://wp-k8s.local');
                // Redis HA via Sentinel
                define('WP_REDIS_SENTINEL', 'mymaster');
                define('WP_REDIS_SENTINEL_CONNECTION', 'redis-sentinel.databases.svc.cluster.local:26379');
                define('WP_REDIS_PASSWORD', getenv('REDIS_PASSWORD'));
                define('WP_REDIS_TIMEOUT', 1);
                define('WP_REDIS_READ_TIMEOUT', 1);
                // OpenTelemetry — tracing distribuido
                // Requiere plugin: wp-packages/opentelemetry-wordpress
                // Las trazas se envían al OTel Collector del nodo
                putenv('OTEL_PHP_AUTOLOAD_ENABLED=true');
                putenv('OTEL_SERVICE_NAME=wordpress');
                putenv('OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector.monitoring.svc.cluster.local:4318');
                putenv('OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf');
                // MinIO S3 — uploads van a MinIO, pods WordPress stateless
                define('AS3CF_SETTINGS', serialize([
                  'provider'                 => 'aws',
                  'access-key-id'            => getenv('MINIO_ACCESS_KEY'),
                  'secret-access-key'        => getenv('MINIO_SECRET_KEY'),
                  'bucket'                   => 'wordpress-uploads',
                  'region'                   => 'us-east-1',
                  'use-server-roles'         => false,
                  'enable-object-prefix'     => true,
                  'object-prefix'            => 'uploads/',
                  'force-https'              => false,
                  'remove-local-file'        => false,
                  'custom-domain'            => 'minio.storage.svc.cluster.local:9000',
                  'enable-delivery-domain'   => true,
                ]));

          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          # R-SEC-2: Probes necesarias para que el Service no envíe tráfico
          # a pods que aún están arrancando o que han quedado en estado zombie.
          # startupProbe da hasta 5 minutos al primer arranque de PHP-FPM+WP
          # antes de que readiness/liveness empiecen a evaluarse.
          startupProbe:
            httpGet:
              path: /wp-login.php
              port: 80
              httpHeaders:
                - name: Host
                  value: wp-k8s.local
            failureThreshold: 30
            periodSeconds: 10          # hasta 5 minutos para el primer startup
          readinessProbe:
            httpGet:
              path: /wp-login.php
              port: 80
              httpHeaders:
                - name: Host
                  value: wp-k8s.local
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
            successThreshold: 1
          livenessProbe:
            httpGet:
              path: /wp-login.php
              port: 80
              httpHeaders:
                - name: Host
                  value: wp-k8s.local
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 5        # tolerante a picos de carga
          volumeMounts:
            # R-1: wordpress-uploads-pvc no existía → se usa un único PVC 'wordpress-pvc'
            # montado en /var/www/html que cubre tanto el core de WP como wp-content/uploads.
            - name: wordpress-storage
              mountPath: /var/www/html
            # R-SEC-1: Con readOnlyRootFilesystem: true, PHP necesita /tmp escribible
            # para ficheros temporales, sesiones y compilación de plantillas.
            - name: tmp-dir
              mountPath: /tmp
            - name: apache-run
              mountPath: /var/run/apache2
      volumes:
        - name: wordpress-storage
          persistentVolumeClaim:
            claimName: wordpress-pvc
        # R-SEC-1: emptyDir proporciona /tmp efímero y escribible por www-data (uid 33).
        # Se vacía automáticamente al terminar el pod, sin coste de almacenamiento persistente.
        - name: tmp-dir
          emptyDir: {}
        - name: apache-run
          emptyDir: {}

---
# ============================================================
# Servicio para WordPress en el namespace 'wordpress'
# Usamos NodePort para acceso externo sin necesidad de LoadBalancer
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: wordpress
  namespace: wordpress
  labels:
    app: wordpress
    app.kubernetes.io/name: wordpress
    app.kubernetes.io/part-of: wordpress-ha
    app.kubernetes.io/component: frontend
spec:
  type: NodePort          # Compatible con Minikube y clústeres sin LoadBalancer
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080     # Puerto accesible desde fuera del clúster: http://<IP-nodo>:30080
  selector:
    app: wordpress
