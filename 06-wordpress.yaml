# ============================================================
# Deployment para WordPress en el namespace 'wordpress'
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wordpress
  namespace: wordpress
  labels:
    app: wordpress
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wordpress
  template:
    metadata:
      labels:
        app: wordpress
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - wordpress
                topologyKey: kubernetes.io/hostname

      containers:
        - name: wordpress
          image: wordpress:6.4
          ports:
            - containerPort: 80
          env:
            - name: WORDPRESS_DB_HOST
              value: "mariadb.databases.svc.cluster.local"

            - name: WORDPRESS_DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: wordpress-config
                  key: WORDPRESS_DB_NAME
            - name: WORDPRESS_DB_USER
              valueFrom:
                configMapKeyRef:
                  name: wordpress-config
                  key: WORDPRESS_DB_USER

            - name: WORDPRESS_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mariadb-secret
                  key: mariadb-user-password

            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: redis-password

            # Configuración extra de WordPress via PHP
            - name: WORDPRESS_CONFIG_EXTRA
              value: |
                define('WP_HOME', 'http://wp-k8s.local');
                define('WP_SITEURL', 'http://wp-k8s.local');
                define('WP_REDIS_HOST', 'redis.databases.svc.cluster.local');
                define('WP_REDIS_PORT', 6379);
                define('WP_REDIS_PASSWORD', getenv('REDIS_PASSWORD'));

          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

          volumeMounts:
            - name: wordpress-storage
              mountPath: /var/www/html
            - name: wordpress-uploads
              mountPath: /var/www/html/wp-content/uploads

      volumes:
        - name: wordpress-storage
          persistentVolumeClaim:
            claimName: wordpress-pvc
        - name: wordpress-uploads
          persistentVolumeClaim:
            claimName: wordpress-uploads-pvc

---
# ============================================================
# Servicio para WordPress en el namespace 'wordpress'
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: wordpress
  namespace: wordpress
spec:
  type: NodePort
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
  selector:
    app: wordpress
