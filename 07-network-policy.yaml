# ============================================================
# IMPORTANTE: Para que los namespaceSelector funcionen correctamente,
# los namespaces deben tener la etiqueta 'kubernetes.io/metadata.name'
# que Kubernetes añade automáticamente desde la versión 1.21+.
# Si tu clúster es anterior, añade las etiquetas manualmente:
#   kubectl label namespace wordpress kubernetes.io/metadata.name=wordpress
#   kubectl label namespace databases kubernetes.io/metadata.name=databases
#
# REQUISITO: estas políticas solo tienen efecto con un CNI compatible.
# Minikube usa kindnet por defecto, que NO implementa NetworkPolicies.
# Para activar Calico:
#   minikube delete
#   minikube start --cni=calico --driver=docker
# ============================================================

# ------------------------------------------------------------
# POLÍTICA 1: MariaDB solo acepta tráfico desde WordPress
# Namespace: databases
# ------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-wordpress-to-mariadb
  namespace: databases
spec:
  podSelector:
    matchLabels:
      app: mariadb
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: wordpress
          podSelector:
            matchLabels:
              app: wordpress
      ports:
        - protocol: TCP
          port: 3306

---
# ------------------------------------------------------------
# POLÍTICA 2: Redis solo acepta tráfico desde WordPress
# Namespace: databases
# ------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-wordpress-to-redis
  namespace: databases
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: wordpress
          podSelector:
            matchLabels:
              app: wordpress
      ports:
        - protocol: TCP
          port: 6379

---
# ------------------------------------------------------------
# POLÍTICA 3: WordPress puede salir hacia databases y recibir HTTP
# También permite salida al exterior para DNS (puerto 53)
# Namespace: wordpress
# ------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-wordpress-egress
  namespace: wordpress
spec:
  podSelector:
    matchLabels:
      app: wordpress
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - protocol: TCP
          port: 80
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: databases
          podSelector:
            matchLabels:
              app: mariadb
      ports:
        - protocol: TCP
          port: 3306
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: databases
          podSelector:
            matchLabels:
              app: redis
      ports:
        - protocol: TCP
          port: 6379
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

---
# ------------------------------------------------------------
# POLÍTICA 4: Default-deny para namespace 'databases'
# Todo el tráfico no permitido explícitamente queda bloqueado.
# Las políticas 1 y 2 añaden las excepciones necesarias.
# ------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-databases
  namespace: databases
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  egress:
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

---
# ------------------------------------------------------------
# POLÍTICA 5: Default-deny para namespace 'wordpress'
# La política 3 añade las excepciones necesarias.
# ------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-wordpress
  namespace: wordpress
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  egress:
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

---
# ------------------------------------------------------------
# POLÍTICA 6: Prometheus puede hacer scrape en namespace 'wordpress'
# Necesaria porque default-deny bloquearía las conexiones de Prometheus.
# ------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scrape
  namespace: wordpress
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
          podSelector:
            matchLabels:
              app: prometheus
      ports:
        - protocol: TCP
          port: 80

---
# ------------------------------------------------------------
# POLÍTICA 7: Prometheus puede hacer scrape en namespace 'databases'
# ------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scrape
  namespace: databases
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
          podSelector:
            matchLabels:
              app: prometheus
      ports:
        - protocol: TCP
          port: 9104   # Puerto de mysqld_exporter cuando se despliegue
